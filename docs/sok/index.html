    const items = [{"t": "Alder ingen hindring for å klare svartbeltegradering", "u": "../alder-ingen-hindring-for-a-klare-svartbeltegradering/index.html", "k": "Side", "d": "2018-07-07", "x": "30. juni besto Øistein Røste (42) 1. Dan under TTUs tradisjonsrike sommerfestival på Elverum. – Både fysisk og mentalt følte jeg meg godt forberedt til graderingen. Taekwondo er tuftet på verdier som respekt, disiplin, fokus, selvtillit og samarbeid. Øistein har trent målrettet i"}, {"t": "Bli medlem", "u": "../bli-medlem/index.html", "k": "Side", "d": "2015-05-13", "x": "Vil du bli medlem hos oss? For å begynne å trene hos oss trenger vi litt informasjon, både om det potensielt nye medlemmet og foresatte, hvis personen er under 18 år. På enkelte treningsgrupper har vi venteliste, så det er viktig at de som har ventet lengst får tilbud først. Det "}, {"t": "Dokumenter", "u": "../dokumenter2/index.html", "k": "Side", "d": "2015-09-29", "x": "2000 Årsmelding RTKD 2001 Årsmelding RTKD 2002 Årsmelding RTKD 2003 Årsmelding RTKD 2004 Årsmelding RTKD 2005 Årsmelding RTKD 2006 Årsmelding RTKD 2007 Årsmelding RTKD 2008 Årsmelding RTKD 2009 Årsmelding RTKD 2010 Årsmelding RTKD 2011 Årsmelding RTKD 2012 Årsmelding RTKD 2013 År"}, {"t": "Galleri", "u": "../galleri/index.html", "k": "Side", "d": "2014-04-02", "x": ""}, {"t": "Historie", "u": "../historie-2/index.html", "k": "Side", "d": "2015-09-07", "x": "Her kan du lese litt av klubbens historie. Skrevet av Per-Ivar og redigert av Geir. Det er nok ikke alt som har kommet med, og desverre mange som ikke får den oppmerksomheten de fortjener. Men vi har forsøkt å få med de store tingne og det som vi kjenner til. Sitter du med info s"}, {"t": "Hvordan varsle om kritikkverdige forhold", "u": "../hvordan-varsle-om-kritikkverdige-forhold/index.html", "k": "Side", "d": "2023-03-05", "x": "Varsling i norsk idrett Ringerike taekwondo klubb ønsker å være en trygg arena for alle våre medlemmer. Det er viktig om du har opplevd eller vært vitne til h x": ""}, {"t": "Pensum", "u": "../pensum/index.html", "k": "Side", "d": "2015-12-06", "x": "Ringerike Taekwondo-klubb følger Traditional Taekwondo Unions graderingspensum, og forsøker å holde dokumentasjonen oppdatert til enhver tid. Hvis du ser noe som ser ut til å være feil, ser andre mangler, eller har forslag til forbedring, si ifra! Graderingssystem Ringerike Taekw"}, {"t": "Pensum til gradering", "u": "../pensum-til-gradering/index.html", "k": "Side", "d": "2021-12-12", "x": "Dan-gradering Master-gradering Klubben har laget en oversikt over pensum til gradering fra og med hvitt til svart belte: Link til Youtube-kanal (klikk her) (Klikk på punktet for å komme direkte til spillelisten - åpnes i ny fane) Poomsae 1-8 3-step (Seobon Kyeoreugi) 1-step håndt"}, {"t": "Pensum til teoriprøve", "u": "../pensum-til-teoriprove/index.html", "k": "Side", "d": "2021-12-12", "x": "Her finner du pensum til teoriprøve, kategorisert etter beltegrad. Oversikten viser alt du bør kunne til teoriprøve til graderingen. Pensum til teoriprøve (PDF) Teori til 1. Dan Link til Quizlet-side (læreverktøy med alt av teoretisk pensum) Gjerne ta kontakt hvis du har noen spø"}, {"t": "Photoshoot", "u": "../galleri/fotoshoot/index.html", "k": "Side", "d": "2015-09-02", "x": ""}, {"t": "Ringerike TKD klubb-Dojang", "u": "../ringerike-tkd-klubb-dojang/index.html", "k": "Side", "d": "2017-06-16", "x": "Ringerike Taekwondo klubb bygger egen treningshall! Vi har inngått en rimelig og langvarig leieavtale med kommunen på et lokale som ligger sentralt. Under by brua ved Nordre torv. I lokalene har det vært noen gamle lokaler som tidligere har vært brukt av feievesenet og diverse la"}, {"t": "Samarbeidspartnere", "u": "../samarbeidspartnere/index.html", "k": "Side", "d": "2015-05-14", "x": "For å kunne drive en frivillig organisasjon som Ringerike Taekwondo-klubb, er gode samarbeidspartnere gull verdt. Vi ønsker all hjelp vi kan få hjertelig velkommen. Dette gjelder både økonomisk hjelp, relevant ekspertise eller kontakter. Ikke nøl med å ta kontakt, dersom du tror "}, {"t": "Styret", "u": "../styret/index.html", "k": "Side", "d": "2015-05-13", "x": "Styret Kontrollutvalg Valgkomite"}, {"t": "Team Ringerike", "u": "../team-ringerike/index.html", "k": "Side", "d": "2020-01-28", "x": "Team Ringerike Hvert år avholdes det regionale og nasjonale stevner rundt om i landet. Dette konkurreres i mønster (poomse) og frikamp. Utøverne som deltar på disse stevnene fra oss utgjør Team Ringerike . Vi har i hovedsak konkurrert i poomse, med mange gode presentasjoner den s"}, {"t": "Team Ringerike TKD", "u": "../team-ringerike-tkd/index.html", "k": "Side", "d": "2020-02-01", "x": "Team Ringerike Hvert år avholdes det regionale og nasjonale stevner rundt om i landet. Dette konkurreres i mønster (poomse) og frikamp. Utøverne som deltar på disse stevnene fra oss utgjør Team Ringerike . Vi har i hovedsak konkurrert i poomse, med mange gode presentasjoner den s"}, {"t": "Treningsplan", "u": "../gradering/index.html", "k": "Side", "d": "2015-05-13", "x": "Treningsplan Tabellen viser ordinære treninger. Vi tilbyr også flere treninger og detaljert treningsplan og oppmøteregistrering gjøres ved hjelp av Spond-appen. Voksne fra 20 år og oppover må melde seg på hver enkelt trening ved hjelp av Spond. Last ned app til din smarttelefon s"}, {"t": "Se bilder fra nyttårscampen med gradering for barna i klubben", "u": "../2024/01/se-bilder-fra-nyttarscampen-med-gradering-for-barna-i-klubben/index.html", "k": "Innlegg", "d": "2024-01-19", "x": "Det var en skikkelig suksess med årets nyttårscamp med gradering for alle barna i klubben Helgen 13.-14. januar deltok over 70 barn på nyttårscamp i klubben med både trening, konkurranse, oppvisning og ikke minst gradering. I år benyttet vi Ullerålhallen, som fungerte godt til vå"}, {"t": "Vinterleir i ski bød på både gradering og trening", "u": "../2023/12/vinterleir-i-ski-bod-pa-bade-gradering-og-trening/index.html", "k": "Innlegg", "d": "2023-12-07", "x": "I helgen 1-3. desember 2023 arrangerte Ski Taekwondo Klubb sin årlige vinterleir. Det var duket for trening, oppvisning og gradering, ikke minst. Graderingen skjedde fredag kveld, og fra vår klubb graderte vår flinke utøver Tor Brede Rognlid til 2. dan! Til tross for litt skader "}, {"t": "To fulle lag med kjempeinnsats i Ringeriksmaraton!", "u": "../2023/08/bra-innsats-i-arets-ringeriksmaraton-3/index.html", "k": "Innlegg", "d": "2023-08-26", "x": "I år igjen var klubben godt representert, med to lag på Ringeriksmaraton! I år klarte vi å stille to fulle lag, uten at noen måtte løpe dobbelt eller med flere stafettpinner, som jo må regnes som en stor suksess. I tabellen ser du lagene. Lagtiden til lag 1 ble 4:43:12 (mot fjorå"}, {"t": "Enda en vellykket sommerfestival i Evje", "u": "../2023/07/enda-en-vellykket-sommerfestival-i-evje/index.html", "k": "Innlegg", "d": "2023-07-24", "x": "Årlig blir det arrangert sommerleir innad i TTU, og i år var det Evje Taekwondo Klubb som igjen arrangerte. Klubbens medlemmer gleder seg alltid til dette, da det er en fin måte å være sosial på og bli kjent med nye mennesker og bli enda bedre kjent med sine egne. I år stilte vi "}, {"t": "Første gang klubben stiller med utøvere i både poomse og kamp!", "u": "../2023/04/forste-gang-klubben-stiller-med-utovere-i-bade-poomse-og-kamp/index.html", "k": "Innlegg", "d": "2023-04-25", "x": "I helgen arrangerte Oslo Taekwondo Klubb Norgescup/Østlandscup 1, der det var duket for poomse-konkurranse lørdag og kamp-konkurranse søndag. Fra klubben har det fra tidligere kun vært utøvere som har konkurrert i poomse, men denne gangen hadde vi flere medlemmer som ville prøve "}, {"t": "Mitt varsel", "u": "../2023/03/mitt-varsel/index.html", "k": "Innlegg", "d": "2023-03-14", "x": "Ringerike Taekwondo klubb ønsker at vår klubb skal være et godt og sikkert sted å være for alle. Vi har nå fått på plass idrettens varslingsportal og den finner du øverst til venstre på vår hjemmeside. Her finner du også informasjon om hva dette er og hvordan eventuelt varsle. I "}, {"t": "Nok et vellykket Juleseminar etter koronapause", "u": "../2022/12/nok-et-vellykket-juleseminar-etter-koronapause/index.html", "k": "Innlegg", "d": "2022-12-23", "x": "17-19. desember arrangerte klubben vår tradisjonelle julecamp etter noen års pause grunnet koronarestriksjoner. Vi har gledet oss til denne helgen, og etter mange treninger og god innsats, kan vi gratulere alle på tiger-, barn- og ungdomsgruppa med en vel gjennomført gradering. I"}, {"t": "Gratulerer til våre nye sortbelter og dangraderte", "u": "../2022/12/gratulerer-sa-mye-til-vare-nye-sortbelter-og-dangraderte/index.html", "k": "Innlegg", "d": "2022-12-04", "x": "I helgen 2-4. desember 2022 arrangerte Ski Taekwondo Klubb sin årlige vinterleir etter 2 års pause grunnet korona. I år var det første vinterleir siden 2019, og det var duket for trening, oppvisning og gradering, ikke minst. Graderingen skjedde fredag kveld, og fra vår klubb var "}, {"t": "Bra oppmøte på Dan-seminaret til Evje", "u": "../2022/11/bra-oppmote-pa-dan-seminaret-til-evje/index.html", "k": "Innlegg", "d": "2022-11-15", "x": "Helgen 28-30. oktober deltok flere av klubbens medlemmer på Dan-seminar hos Evje Taekwondo Klubb! Dan-seminar er åpent for alle med rødt belte og oppover, og er som en forbedring til Dan-gradering. I klubben har vi flere 1. og 2. dan kandidater, og alle disse tok styrke- og teori"}, {"t": "Gratulerer med mange bra plasseringer i Online Poomsae 4", "u": "../2022/10/gratulerer-med-mange-bra-plasseringer-i-online-poomsae-4/index.html", "k": "Innlegg", "d": "2022-10-11", "x": "Dette er andre gang Ringerike Taekwondo har deltatt i Online Poomse-konkurranse, og denne gangen var det enda flere deltakere med, og det gikk strålende! Til sammen fikk vi 2. plass for sammenlagte medaljer. Online Poomse-konkurranse fungerer slik at hver utøver sender inn videoe"}, {"t": "Gratulerer med strålende plasseringer i NC3", "u": "../2022/09/gratulerer-med-stralende-plasseringer-i-nc3/index.html", "k": "Innlegg", "d": "2022-09-26", "x": "Hele syv utøvere fra klubben deltok i NC3 i Letohallen i helgen, og konkurrerte i Poomse, og det ble en rekke medaljer! I senior-klassen deltok Alexander Linvik, og tok sølv i sin første konkurranse. Gratulerer! I kadett-klassen deltok Amanda Zabele, og hun tok også sølv . Gratul"}, {"t": "Bra innsats i årets Ringeriksmaraton", "u": "../2022/08/bra-innsats-i-arets-ringeriksmaraton-2/index.html", "k": "Innlegg", "d": "2022-08-22", "x": "Etter flere år uten, var det i år endelig klart for Ringeriksmaraton. Klubben var representert med to lag i Mix-klassen. På grunn av noen kjedelige skader på enkelte av de planlagte løperne endte det opp med å være 13 deltakere til sammen. Dette medførte at de tre første etappene"}, {"t": "Årets sommerfestival var en kjempehit!", "u": "../2022/07/arets-sommerfestival-var-en-kjempehit/index.html", "k": "Innlegg", "d": "2022-07-11", "x": "Etter to med pandemi var det endelig igjen klart for Traditional Taekwondo Unions (TTU) sommerfestival . Sommerfestivalen er et arrangement på nesten en uke med trening, overnatting og sosial hygge med gamle og nye vennskaper. I var sommerleiren lagt til Nord-Odalen og arrangert "}, {"t": "Takk for et fint dan-seminar hos Kunja Taekwondo", "u": "../2022/06/takk-for-et-fint-dan-seminar-hos-kunja-taekwondo/index.html", "k": "Innlegg", "d": "2022-06-12", "x": "Helga fra 3-5. juni arrangerte Kunja Taekwondo , samme klubb som arrangerer sommerleir, Dan-seminar for 4. cup og oppover. Der ble pensum for Dan-gradering gjennomgått, og det var mulighet for å gjennomføre både fysisk test og teoritest. Det var Patrick Myhren (6. dan), Ingrid Bo"}, {"t": "Gratulerer med pallplass på Online NC2", "u": "../2022/04/gratulerer-med-pallplass-pa-online-nc2/index.html", "k": "Innlegg", "d": "2022-04-05", "x": "Dette er første gang Ringerike Taekwondo har deltatt i Online Poomse-konkurranse, og det gikk strålende! Fra klubben stilte Amanda Zabele og Anna Upite, og begge to fikk pallplass i kadettklassen. Amanda fikk gull og Anna fikk sølv, så gratulerer til dere begge! Her er link til v"}, {"t": "Sølv og bronse i NC 1 i Drammen", "u": "../2022/03/solv-og-bronse-i-nc-1-i-drammen/index.html", "k": "Innlegg", "d": "2022-03-27", "x": "Fem utøvere fra klubben konkurrerte i mønster i Drammen i helgen, og to kom hjem med medalje. Ringerike Taekwondo stilte med to jenter (Amanda Zabele og Anna Upite) kadettklassen og tre (Nora Henriksen, Lene Kristine Røste og Sara Helene Fischer) i juniorklassen i poomse. Dette e"}, {"t": "Brosjyren for årets sommerfestival har kommet", "u": "../2022/02/brosjyren-for-arets-sommerfestival-har-kommet/index.html", "k": "Innlegg", "d": "2022-02-17", "x": "Her finner du brosjyren for årets Sommerfestival, som arrangeres av Kunja Taekwondo-klubb i Nord-Odal. Samlet informasjon fra klubben finner du på hjemmesidens kalender her. Trykk på bildet for å laste ned brosjyren"}, {"t": "Teoripensum på hjemmesiden", "u": "../2022/02/teoripensum-pa-hjemmesiden/index.html", "k": "Innlegg", "d": "2022-02-09", "x": "Har du fått med deg at alt av teoripensum til gradering ligger på hjemmesiden? Her på hjemmesiden finner du alt du trenger for å lære teoripensumet vi har i klubben, både et hefte med alt samlet, og øveprøver! Siden finner du i hovedmenyen -> Pensum -> Pensum til teoriprøve, elle"}, {"t": "Julehilsen fra TTU!", "u": "../2021/12/julehilsen-fra-ttu/index.html", "k": "Innlegg", "d": "2021-12-22", "x": "Sesongen er over for denne gang og Ringerike TKD ønsker alle en trivelig jul og godt nyttår! Her følger en julehilsen, fra TTU til alle TTUs medlemmer Kjære alle TTU-medlemmer Nå nærmer julen seg raskt og TTU håper dere alle får en fin førjulstid. Vi ser tilbake på et år som dess"}, {"t": "Gratulerer med gradering!", "u": "../2021/12/gratulerer-med-gradering/index.html", "k": "Innlegg", "d": "2021-12-12", "x": "Denne helgen arrangerte vi julegradering for alle medlemmer i klubben! På lørdag 11. desember var det gradering for tigre og barn nybegynnere På søndag 12. desember var det gradering for barn viderekomne og ungdom & voksen Gratulerer til alle for vel gjennomført gradering, og god"}, {"t": "Endelig er våre nye lokaler offisielt åpne!", "u": "../2021/09/endelig-er-vare-nye-lokaler-offisielt-apne/index.html", "k": "Innlegg", "d": "2021-09-08", "x": "Lørdag 3. september åpnet vi offisielt vårt nye treningslokale i Strandgata 1C i Nordre Brukar. På dagtid var det snorklipping med styret, Grandmaster Cho Won Sup, Ringerikes blad og et knippe viktige samarbeidspartnere, og spesielle gjester. Når kvelden kom var det en hyggelig b"}, {"t": "Nytt medlemssystem", "u": "../2021/08/nytt-medlemssystem/index.html", "k": "Innlegg", "d": "2021-08-20", "x": "Ringerike TKD klubb får nytt medlemssystem. Det er besluttet nasjonalt at alle klubber tilhørende Norges idrettsforbund skal over på dette systemet og noe klubben bare må følge. Dette vil medføre at alle eksisterende medlemmer må over i det nye systemet. Dette vil medføre litt ar"}, {"t": "Vi er klare for sesongstart!", "u": "../2021/08/vi-er-klare-for-sesongstart/index.html", "k": "Innlegg", "d": "2021-08-08", "x": "Vi i Ringerike Taekwondo klubb er klare for ny sesong og ønsker både gamle og nye medlemmer velkommen til trening i nye lokaler i Strandgata 1C. Vi gleder oss veldig til å gå løs på en sesong mindre preget av Covid-19 og mye treningsglede, konkurranser og moro! Vi har gjort en li"}, {"t": "Mer informasjon om sommerens gradering", "u": "../2021/06/mer-informasjon-om-sommerens-gradering/index.html", "k": "Innlegg", "d": "2021-06-11", "x": "Hei alle sammen Vi er klare for gradering lørdag 12.06.2021 for barn 1 på lørdag i tidsrommet 1000-1200 og for gruppe ungdom -20 år i tidsrommet 1400- ca.1600. Regler for smittevern i idretten har endret seg mye i løpet av det siste året og jeg har lest meg opp i dag på gjeldene "}, {"t": "Gradering sommer 2021", "u": "../2021/05/gradering-sommer-2021/index.html", "k": "Innlegg", "d": "2021-05-12", "x": "Gradering sommer 2021 Klubben har besluttet at vi skal kjøre en gradering før sommerferien. Dette året har vært litt spesielt så vi må gjøre noen tilpassinger. Vi har alle hatt noen perioder hvor vi ikke kunne trene. Men innenfor den tiden vi har hatt åpent har noen trent mye og "}, {"t": "Nye Treningstider fra 03.05.2021", "u": "../2021/04/nye-treningstider-fra-03-05-2021/index.html", "k": "Innlegg", "d": "2021-04-27", "x": "Da kan vi åpne opp for trening for de som er 20 år og eldre. Men bare inntil 10 personer på trening. Derfor må de som vil være med på 20 + treningen melde seg på via Spond. Se også info på facebook-siden. Lenke til Spond finner du her"}, {"t": "Vi åpner treningen for de under 20 år.", "u": "../2021/04/vi-apner-opp-for-trening-for-de-under-20-ar/index.html", "k": "Innlegg", "d": "2021-04-11", "x": "Gode nyheter. Da er det besluttet at de under 20 år i Ringerike igjen kan trene innendørs. Klubben åpner derfor opp for trening med de midlertidige treningstidene vi har hatt en god stund nå fra mandag 12.04.2021. Vi gleder oss til å se dere på trening igjen. Styret/instruktørene"}, {"t": "Ingen trening før etter 11.04.2021", "u": "../2021/01/vi-starter-opp-trening-fra-25-01-2021/index.html", "k": "Innlegg", "d": "2021-01-18", "x": "Klubben må stenge alle treninger fra og med 16.03.2021 og til og med 11.04.2021. Dette på grunn av Nasjonale føringer for smittevern. Dette er veldig kjedelig for klubben, men vi har ikke noe valg og må som alle andre bidra i denne nasjonale dugnaden for å begrense spredningen av"}, {"t": "Oppstart trening utsatt til 19.01.2021", "u": "../2021/01/oppstart-trening-utsatt-til-19-01-2021/index.html", "k": "Innlegg", "d": "2021-01-03", "x": "Klubben må dessverre utsette oppstart av trening for sesongen til tidligst 19.01.2021. Dette på grunn av føringer gitt av myndighetene den 3.1.2021. Det vil derfor ikke være organisert trening i regi av klubben før vi sender ut ny informasjon. Dette er veldig kjedelig, men vi må "}, {"t": "Lokal korona-forsikrift", "u": "../2020/12/lokal-korona-forsikrift/index.html", "k": "Innlegg", "d": "2020-12-27", "x": "Ringerike kommune har innført en lokal korona-forskrift. Denne er gjeldene fra 25.12.2020 til og med 13.01.2021 . Dette får følger også for Ringerike taekwondo klubb. Medlemmer som er 20 år og eldre kan ikke møte på trening før tidligst 14.01.2021. Klubben starter opp trening 04."}, {"t": "Informasjon om venteliste på nye medlemmer", "u": "../2020/11/informasjon-om-venteliste-pa-nye-medlemmer/index.html", "k": "Innlegg", "d": "2020-11-03", "x": "Vi har dessverre venteliste på både tiger- og på barnepartiet. Dette er på grunn av begrensninger på hvor mange vi kan ha på trening. Vi har plass til flere på ungdom og voksen-gruppen. Dette er de som går på ungdomsskolen og eldre. Vi håper å kunne tilby plass til flere barn ove"}, {"t": "Midlertidige retningslinjer for høstsesongen", "u": "../2020/08/midlertidige-retningslinjer-for-hostsesongen/index.html", "k": "Innlegg", "d": "2020-08-20", "x": "Klubben må gjøre en rekke tiltak for å imøtekomme krav fra kommunen og Norges idrettsforbund. Nye gruppeinndelinger, nye treningstider. Dette vil nok ikke passe for alle, men husk at dette er midlertidig og vi må alle bidra. 24.08. er vi i gang igjen! For å laste ned PDF klikker "}, {"t": "Utetrening frem mot sommeren", "u": "../2020/05/ute-trening/index.html", "k": "Innlegg", "d": "2020-05-17", "x": "Frem mot sommerferien vil det være utetreninger (med værforbehold) Vi legger ut program for en uke av gangen. Det vil være trening for ungdom- og voksengruppen samt for barn. Tigergruppen vil ikke bli startet opp før etter sommerferien. Følg med her på hjemmesiden eller på facebo"}, {"t": "Til alle medlemmer.", "u": "../2020/04/til-alle-medlemmer/index.html", "k": "Innlegg", "d": "2020-04-03", "x": "Til alle medlemmer i Ringerike TKD klubb. Vi er alle inne i en vanskelig tid. Den pågående pandemien rammer hver enkelt en av oss på forskjellige måter. Også klubben er rammet ved at vi ikke kan møtes for å trene. Styret gjennomførte for første gang et styremøte 2.4.2020 via Team"}, {"t": "ALL TRENING AVLYST", "u": "../2020/03/informasjon-vedrorende-koronavirus/index.html", "k": "Innlegg", "d": "2020-03-11", "x": "På bakgrunn av helsemyndighetenes føringer i den vanskelige koronasituasjonen avlyser Ringerike TKD all trening med umiddelbar virkning. Klubbens årsmøte er også utsatt inntil videre. Klubben stenges i første omgang til 13.4.2020 . Det vil si første virkedag etter påske. Vi komme"}, {"t": "Minneverdig julecamp for barna", "u": "../2020/02/minneverdig-julecamp-for-barna/index.html", "k": "Innlegg", "d": "2020-02-08", "x": "Vår tradisjon er å arrangere julecamp hvert år, og det ble det i år også. 40 barn var med og hadde en minneverdig kveld der de ble kjent med mange nye, samtidig som de lærte mye nytt! Vi fikk besøk av taekwondo-nissen, noe barna syntes var veldig stas! Det var tre treninger, der "}, {"t": "Rekordbra oppmøte på vinterleir i Ski!", "u": "../2019/12/rekordbra-oppmote-pa-vinterleir-i-ski/index.html", "k": "Innlegg", "d": "2019-12-22", "x": "Hvert år arrangerer Ski taekwondo klubb vinterleir, og i år var det fra 29. november til 1. desember. Hele 21 (!) stykker fra Ringerike dro hit, som er et veldig bra oppmøte! Alt fra hvit-belter til svart-belter var med, så dette passer for alle. Slike leir er først og fremst for"}, {"t": "Lærerikt Dan-seminar hos Kvernbit Taekwondo Klubb", "u": "../2019/11/laererikt-dan-seminar-i-kvernbit/index.html", "k": "Innlegg", "d": "2019-11-10", "x": "Denne helgen ble det arrangert Dan-seminar for rød- og svartbelter i Kvernbit. Det var en lærerik helg med masse fokus på pensum frem mot dan-gradering. En ganske stor gjeng på 10 stykker fra Ringerike bestemte seg for å dra. \"Kraftriket\" var så snille og sponset oss med 3000kr t"}, {"t": "FULL KLAFF UNDER ÅRETS SISTE NORGESCUP", "u": "../2019/09/3876/index.html", "k": "Innlegg", "d": "2019-09-29", "x": "Team Ringerike stilte igjen opp på Østlandscup og Norgescup (NC3) på Grorud i helga. Denne gangen var det fire utøvere som konkurrerte i poomse, og alle tok med seg edelt metall hjem! Natalie Gaardahammer tok gull i klassen, som ungdom B cup høy . I klassen Junior B cup høy , gjo"}, {"t": "Oppstart etter ferien", "u": "../2019/08/oppstart-etter-ferien/index.html", "k": "Innlegg", "d": "2019-08-16", "x": "Etter en lang ferie, er vi klare til å starte opp igjen! Vi tar imot medlemmer i alle aldre, her kan hele familien få allsidig trening. Vi har et godt treningsmiljø, med dyktige instruktører og vi er klare til ønske nye og gamle velkommen til en ny sesong. Vi starter opp igjen ma"}, {"t": "Årets sommerfestival bød på mange spennende opplevelser", "u": "../2019/07/arets-sommerfestival-bydde-pa-mange-spennende-opplevelser/index.html", "k": "Innlegg", "d": "2019-07-19", "x": "13 stykker fra Ringerike Taekwondo Klubb dro på TTU sin sommerfestival i Evje. Det er 9 mer enn i fjor, men neste år håper vi på å være enda flere, for dette er noe som passer for alle! Koselig sted Sommerfestivalen ble i år holdt i Evje, et sted på sørlandet som er cirka en time"}, {"t": "Danseminar Islev", "u": "../2019/06/danseminar-islev-uferdig/index.html", "k": "Innlegg", "d": "2019-06-04", "x": "Sju medlemmer fra Ringerike TKD bestemte seg for å dra til danseminaret i Islev fra 31.mai til 2.juni. Der kunne alle fra rødt belte og oppover bli med. Utenlandske medlemmer skulle ankomme dagen før de danske, derfor ankom medlemmer fra Ringerike TKD og andre klubber fra over he"}, {"t": "MEDALJEDRYSSET FORTSETTER", "u": "../2019/06/medaljedrysset-fortsetter/index.html", "k": "Innlegg", "d": "2019-06-04", "x": "TEAM RINGERIKE. Bak fra venstre. Geir Karlsen, Syver Bakken Finnes, Natalie Håve Gårdhamer, Charlotte Vedhus Slettebakken, Helene Mala Haga, Ida Helene Bye, Nora Henriksen, Øistein Røste, Artsiom Stalmakov. Foran fra venstre. Lene Kristine Røste, Sara Helene Fischer, Aleksander G"}, {"t": "Fikk 300.000 kroner til nye treningslokaler", "u": "../2019/05/fikk-300-000-kroner-til-nye-treningslokaler/index.html", "k": "Innlegg", "d": "2019-05-21", "x": "I løpet av året håper vi å flytte fra Ringerikshallen til nye lokaler i brua ved Nordre torg. Ringerikes Blad var med da Øistein Røste, Artsiom Stalmakou, Helene Mala Haga og Ida Helen Bye møtte opp for den offisielle overrekkelsen av støtten på 300.000 kroner fra Sparebankstifte"}, {"t": "Protokoll fra årsmøte 2019 RTKD.", "u": "../2019/04/protokoll-fra-arsmote-rtkd/index.html", "k": "Innlegg", "d": "2019-04-04", "x": "Protokollen fra årsmøtet er nå lastet opp på websiden. Du kan laste den ned her: 2019 Årsmøte protokoll RTKD Det ble vedtatt endringer i kontigent. De nye kontinentene med virkning fra 1.5.2019 er: Tiger 150 per ,-måned. Barn under 12 år 210,- per måned. Ungdom og voksen (over 12"}, {"t": "TEAM RINGERIKE TKD GJENOPPSTÅR: KLINTE TIL MED GULL, SØLV OG BRONSE", "u": "../2019/02/team-ringerike-tkd-gjenoppstar-klinte-til-med-gull-solv-og-bronse/index.html", "k": "Innlegg", "d": "2019-02-25", "x": "Skrevet av medlem Trond Schieldrop og først publisert i RingeriksAvisa: https://www.ringeriksavisa.no/arkiv/item/3997-team-ringerike-tkd-gjenoppstar-klinte-til-med-gull-solv-og-bronse Etter 10 års fravær gjenoppsto Team Ringerike Taekwondo (TKD) på lørdagens Østlandscup (ØC) og n"}, {"t": "Bra innsats i årets Ringeriksmaraton", "u": "../2018/08/bra-innsats-i-arets-ringeriksmaraton/index.html", "k": "Innlegg", "d": "2018-08-28", "x": "I år igjen stilte klubben opp med lag i Ringeriksmaraton. Det ble en gjeng med både kvinner og menn, men som denne gang løp i herreklassen, da antall kvinner på laget ikke kunne rettferdigjøre \"Mix\" i år. Den totale tiden ble på rett over fire timer, helt nøyaktig 4:00:57 . Løpev"}, {"t": "Alder ingen hindring for å klare svartbeltegradering", "u": "../2018/07/alder-ingen-hindring-for-a-klare-svartbeltegradering/index.html", "k": "Innlegg", "d": "2018-07-07", "x": "30. juni besto Øistein Røste (42) 1. Dan under TTUs tradisjonsrike sommerfestival på Elverum. – Både fysisk og mentalt følte jeg meg godt forberedt til graderingen. Taekwondo er tuftet på verdier som respekt, disiplin, fokus, selvtillit og samarbeid. Øistein har trent målrettet i"}, {"t": "Gradering for alle grupper.", "u": "../2018/05/gradering-for-alle-grupper/index.html", "k": "Innlegg", "d": "2018-05-22", "x": "Det går mot sommer og tid for gradering for alle partiene. Du kan laste ned informasjon samlet her. 2018 Gradering sommer"}, {"t": "Sponsortreff med slag og spark", "u": "../2018/05/sponsortreff-med-slag-og-spark/index.html", "k": "Innlegg", "d": "2018-05-05", "x": "Lørdag 28. april arrangerte Ringerike Taekwondo klubb et sponsortreff for sine sponsorer. Dessverre kunne ikke alle komme. For de fremmøtte ble det holdt en kort presentasjon om fremdriften på den nye treningshallen midt under bybrua i Hønefoss, som skal være innflyttingsklar som"}, {"t": "Siste frist for påmelding på årets sommerleir, 21. juni", "u": "../2018/02/invitasjonen-arets-sommerfestival-ute/index.html", "k": "Innlegg", "d": "2018-02-20", "x": "Årets begivenhet for oss i TTU er Grandmaster Chos sommerfestival, og du kan laste ned invitasjonen HER! Påmeldingsfrist for sommerleir og dan-gradering er 21.juni kl 24:00. Skolen er åpen fom ettermiddagen fredag 29.juni for de som ønsker å komme tidligere. For de som skal grade"}, {"t": "Rekordoppslutning på årets juleseminar", "u": "../2018/01/rekordoppslutning-pa-arets-juleseminar/index.html", "k": "Innlegg", "d": "2018-01-11", "x": "16. og 17. desember arrangerte Ringerike Taekwondo Klubb juleseminar for Tiger- og Barnegruppa med rekordoppslutning. 68 barn deltok på arrangementet som ble avsluttet med gradering på søndag. – Alle besto graderingen, sier klubbens leder Geir Karlsen og instruktør Reinhardt G. S"}, {"t": "Trening 2018 er i gang.", "u": "../2018/01/trening-2018-gang/index.html", "k": "Innlegg", "d": "2018-01-02", "x": "Fra og med 2.januar er klubben i full drift igjen. Vi hadde som mål og få sendt ut info om dette før nyttår, men administrasjonen fikk det dessverre ikke ferdig før nå. Men her kommer 1/2 års planen. Den vil bli linket inn på siden snarlig. Nytt fra 2018 er at onsdager nå blir hø"}, {"t": "14. dagers treningssamling i Sør-Korea: Perfeksjonering i flere tusen år gammel kampsporttradisjon", "u": "../2017/09/14-dagers-treningssamling-sor-korea-perfeksjonering-flere-tusen-ar-gammel-kampsporttradisjon/index.html", "k": "Innlegg", "d": "2017-09-30", "x": "I midten av august var en del av klubbens instruktører og elever på et 14. dagers trenings-, kultur- og ferieopphold i Taekwondos hjemland Sør-Korea. – Første uke var det kampsporttrening fire ganger om dagen på Chosun University i Gwangju, forteller instruktør Reinhardt G. Skøie"}, {"t": "Glemt belte? Rosa belte!", "u": "../2017/09/2247/index.html", "k": "Innlegg", "d": "2017-09-15", "x": "Klubben har fra 15.8.2017 innført Rosa belte for medlemmer med gult belte eller høyere på ungdom og voksen gruppen som møter på trening og har gjort en av følgende TKD synder. 1. Glemt belte. 2. Ikke ha klubbmerke på drakten 3. Ikke ha TTU merke på drakten. 4. Glemt drakt. Disse "}, {"t": "Graderingsregler Ringerike TKD", "u": "../2017/09/graderingsregler-ringerike-tkd/index.html", "k": "Innlegg", "d": "2017-09-10", "x": "Klubbens instruktører har revidert klubbens graderingspensum. Det er med virkning fra 1.8.2017 besluttet å endre litt på beltegradene for vårt barneparti. Vi har overt tid sett at barna trenger noe mer tid på å utvikle de ferdighetene vi ønsker å lære dem. Derfor har vi lagt inn "}, {"t": "Vi trenger flere hjelpeinstruktører.", "u": "../2017/09/trenger-flere-hjelpeinstruktorer/index.html", "k": "Innlegg", "d": "2017-09-10", "x": "Klubben har et behov for flere hjelpe instruktører. Dette er hovedsakelig til å støtte og hjelpe instruktørene som har trening for barna i klubben. Vi ser for oss å knytte til oss 3.personer som vil få status som hjelpeinstruktører. Har du lyst til å bli med på vårt lag av instru"}, {"t": "Vi tar imot nybegynnere.", "u": "../2017/08/tar-imot-nybegynnere/index.html", "k": "Innlegg", "d": "2017-08-11", "x": "Ringerike TKD klubb har plass til flere medlemmer. Bli med og tren i en klubb hvor ingen må sitte på benken. Vi har ledig plass på alle våre partier. Vi håper spesielt å få flere medlemmer i ungdoms og voksen alder. Vi har et godt og inkluderende miljø med meget erfarne instruktø"}, {"t": "Treningsplan for høsten 2017 er klar", "u": "../2017/08/treningsplan-hosten-2017-klar/index.html", "k": "Innlegg", "d": "2017-08-07", "x": "Da har vi fått klar 1/2 års planen for treninger for årets høstsesong frem mot sommeren. Av de viktigste endringe har vi at vi Tigertreningen er flyttet fra mandag til onsdag og at vi har fått tilbake en gammel kjenning i instruktørteamet, Anders. Ungdom- og voksentreningen er ut"}, {"t": "Sparebank 1 stiftelsen slår på stortromma: Har bidratt med 650 000 kroner til ny treningshall for Ringerike TKD Klubb", "u": "../2017/05/sparebank-1-stiftelsen-slar-pa-stortromma/index.html", "k": "Innlegg", "d": "2017-05-03", "x": "Overraskelsen var stor da instruktør Tor-Brede Rognlid under torsdagstreningen 27. april kom med en sjekk på 300 000 kroner fra Sparebank 1 stiftelsen til det nye treningssenteret i Hønefoss. – Vi hadde ikke forventet så mye penger og er dypt takknemlig for givergleden, sier Mast"}, {"t": "Årsmøte 2017", "u": "../2017/03/arsmote-dokumenter-2017/index.html", "k": "Innlegg", "d": "2017-03-20", "x": "Klubben minner om årsmøtet som avholdes fredag 24.3.2017 kl 18.00 under enkle forhold i Nordre Brukar. Lokalet er under oppussing så ta gjerne på deg varme klær. Obs det er ikke toalett i lokalet enda. Komplett saksliste med vedlegg kan lastes ned her: 2017 årsmøtedokument Ringer"}, {"t": "Årsmelding 2016.", "u": "../2017/03/arsmelding-2016/index.html", "k": "Innlegg", "d": "2017-03-07", "x": "Klubbens årsmelding for 2016 er nå lagt til i dokument arkivet. Du kan lese den her. 2016 årsmelding Ringerike TKD"}, {"t": "1/2-års plan for våren 2017 er klar", "u": "../2017/01/12-ars-plan-varen-2017-klar/index.html", "k": "Innlegg", "d": "2017-01-04", "x": "Da har vi fått klar 1/2 års planen for treninger frem mot sommeren. I år blir sommerleiren fra onsdag 28.juni til søndag 2.juli. Dette er en super nyhet som gjør at alle kan ta seg til til å reise på sommerleir. Bli med du også da vel! Gradering for tiger og barn er planlagt til "}, {"t": "GM Cho Woon Sup kommer på Dan-seminaret", "u": "../2016/11/gm-cho-woon-sup-kommer-pa-dan-seminaret/index.html", "k": "Innlegg", "d": "2016-11-09", "x": "Grandmaster Cho Woon Sup kommer som instruktør på vårt Dan seminar 18-20. november i tillegg til master Anna Kim. Selv om påmeldingsfristen er gått ut, skal vi klare å få plass til noen til. Meld dere på så snart som mulig eller ta kontakt på post@arkiv.ringeriketkd.no"}, {"t": "Hønefoss Brasiliansk jiu-jitsu klubb", "u": "../2016/09/honefoss-brasiliansk-ju-jitsu-klubb/index.html", "k": "Innlegg", "d": "2016-09-15", "x": "En ny kampsport klubb startes opp i disse dager i Hønefoss. Hønefoss Brasiliansk jiu-jitsu klubb Kjell-Marius Jøntvedt som er medlem i Ringerike TKD klubb har blått belte i BJJ og har tidligere trent på Frontline Academy Majorstuen i 3 år. Han har også erfaring fra MMA, men ønske"}, {"t": "Tigergruppen er helt full!", "u": "../2016/08/tiger-gruppen-helt-full/index.html", "k": "Innlegg", "d": "2016-08-30", "x": "Klubben må nå si stopp for inntak av nye medlemmer på Tigergruppen. Vi klarer ikke ta imot flere barn. Dette synes vi er trist, men det har kommet mange nye denne sesongen. Dette gjelder gruppen for 1-3 klasse som trener på mandager. Har du lyst til å begynne her så send en e-pos"}, {"t": "Ringeriksmaraton 2016", "u": "../2016/08/ringeriksmaraton-2016/index.html", "k": "Innlegg", "d": "2016-08-20", "x": "Klubben stilte også i år lag i Ringeriksmaraton. Dette har blitt en hyggelig tradisjon som vi ønsker å holde på. Tor-Brede har vært primus motor og han har allerede begynt å fordele etappene for 2017. I år klarte vi å stille et lag bestående bare av klubbmedlemmer. Vi håper neste"}, {"t": "En ny sortbelte i klubben", "u": "../2016/06/sort-belte-klubben/index.html", "k": "Innlegg", "d": "2016-06-29", "x": "Tor-Brede Rognlid gikk opp til sort belte 1.Dan på sommerfestivalen. Han gjorde en god gradering. Hele klubben gratulerer. Stor takk til Artsiom Stalmakov for god hjelp til oppkjøringen."}, {"t": "Sparebank 1 stiftelsen tildelte Ringerike TKD klubb 350.000", "u": "../2016/04/sparebank-1-stiftelsen-tildelte-ringerike-tkd-klubb-350-000/index.html", "k": "Innlegg", "d": "2016-04-08", "x": "Onsdag 6.4.2016 ble en stor dag for klubben. Tor-Brede Rognlid var tilstede på bysenen under Sparebank 1 stiftelsens gavedryss. Med mange sommerfugler i maven satt han og hadde håpet for klubben om at vår søknad skulle bli tildelt støtte. Geir satt denne kvelden i en møte på kamp"}, {"t": "Bry seg om-aksjonen", "u": "../2015/12/bry-seg-om-aksjonen/index.html", "k": "Innlegg", "d": "2015-12-22", "x": "Ringerike TKD er årets mottaker av \"Bry seg om\"-aksjonen. Bry seg om-aksjonen er et årlig tiltak, arrangert av Stiftelsen Positiv Oppvekst, som hvert år trekker frem gode tilbud til barn og unge i distriktet. I år er det Ringerike TKD-klubb som er valgt, spesielt med fokus på vår"}, {"t": "Dan seminar i Kongsberg TKD.", "u": "../2015/11/dan-seminar-i-kongsberg-tkd/index.html", "k": "Innlegg", "d": "2015-11-15", "x": "Klubben gratulerer Andrine og Tor-Brede med bestått Fysisk test og teoriprøve. Da er det bare å legge seg i hardtrening neste 1/2 år og finpusse teknikker og gjøre seg klar for en gradering på sommerfestivalen 2016. RKTD stilte med Andrine, Tor-Brede, Artsiom og Geir på Dan semin"}, {"t": "God stemning på sensommertrening", "u": "../2015/09/god-stemning-pa-sensommertrening/index.html", "k": "Innlegg", "d": "2015-09-01", "x": "På treningssamlingen i Osterøy i helgen reiste fem representanter fra Ringerike. De bestod av Jennifer, Andrine, Arsiom, Tor-Brede og Anders. Samlingen var en såkalt \"Sensommertrening\" lokalisert på Traditional Taekwondo Unions (TTU) hovedsete og Norsk-koreansk kultursenter på Os"}, {"t": "Agnethe knuste alle i Vikingrace", "u": "../2015/08/agnethe-knuste-alle-i-vikingrace/index.html", "k": "Innlegg", "d": "2015-08-25", "x": "Vi gratulerer en av våre sortbelter, Agnethe Reymert med en knusende seier i Vikingrace i Grefsenkollen, et av Norges tøffeste hinderløp. Agnethe kom på første plass blant 218 deltakende kvinner, i følge Ringerikes Blad, på tiden 43:36, tre minutter før neste fulførende kvinne. D"}, {"t": "Vel løpt i Ringeriksmaraton", "u": "../2015/08/vel-lopt-i-ringeriksmaratong/index.html", "k": "Innlegg", "d": "2015-08-18", "x": "Ringerike Taekwondo klubb stilte lag i årets Ringeriksmaraton. En sprek gjeng som ga alt i løypa. Tiden ble 4:14:46 på vårt mix-lag, som bestod av: Andrine Løvhøiden Geir Karlsen Roger Lippert Analyn Karlsen Tor-Brede Rognlid Anders S. Helmen Reinhardt Skøien Ivar Elnæs (med kvin"}, {"t": "Vi er klare for ny sesong!", "u": "../2015/08/vi-er-klare-for-ny-sesong/index.html", "k": "Innlegg", "d": "2015-08-12", "x": "Denne sesongen utvider vi treningstilbudet til tre treningsdager i uken! Vi tar imot nybegynnere fra uke 35. Uke 34 er det bare trening for voksengruppen. Altså 18. og 20.august. Nye treningstider finner du nederst på hjemmesiden, eller her . Komplett treningsplan for sesongen få"}, {"t": "Ny treningshall!", "u": "../2015/05/ny-treningshall/index.html", "k": "Innlegg", "d": "2015-05-13", "x": "Ringerike Taekwondo klubb skal bygge en egen treningshall! Vi har inngått en rimelig og langvarig leieavtale med kommunen på et lokale som ligger sentralt. Under by brua ved Nordre torv. Det eneste negative er at vi må pusse opp lokalene selv. I lokalene har det vært noen gamle l"}, {"t": "Juleseminar og gradering 2014", "u": "../2015/01/juleseminar-og-gradering-2014/index.html", "k": "Innlegg", "d": "2015-01-16", "x": "Ringerike Taekwondo Klubb gjennomførte det årlige juleseminaret for klubbens barnegrupper helgen 13.-14. desember. Årets seminar er så langt det største i klubbens historie og betegnes av deltakere og foreldre som en suksess. Bilde: Kyosa-nim Artsiom instruerer en ivrig barnegrup"}, {"t": "Juleseminar 2013", "u": "../2013/12/juleseminar-2013/index.html", "k": "Innlegg", "d": "2013-12-28", "x": "Lørdag formiddag møtte det 50 spente utøvere for å delta på årets juleseminar. Det begynte med registrering og å finne seg en plass i dojang hvor natten skulle tilbringes. De fleste hadde med seg sovepose og liggeunderlag, men det ble også observert flere enorme oppblåsbare madra"}, {"t": "2013 Juni. Bilde av barne partiet som graderte", "u": "../2013/06/2013-juni-bilde-barne-partiet-graderte/index.html", "k": "Innlegg", "d": "2013-06-16", "x": ""}, {"t": "2013 Barn gradering.", "u": "../2013/06/2013-barn-gradering/index.html", "k": "Innlegg", "d": "2013-06-16", "x": "På Søndagen var det barna sin tur til å vise hva de hadde lært. Barnegruppa er fra de som har fylt 10 og opp til de er fylt 12 år. Det var 23 stk som møtte opp til gradering. Det var mange som hadde sommerfugler i magen, men følte seg klare til å vise hva de har lært. Når klokken"}, {"t": "Gradering Ungdom og voksne Søndag 16 juni 2013", "u": "../2013/06/gradering-ungdom-voksne-sondag-16-juni-2013/index.html", "k": "Innlegg", "d": "2013-06-16", "x": "På ungdom/voksne hadde alle gradert før og den laveste graderte var en grøntbelte og det gikk helt opp til rødt med en stripe. Alle visste hva det gikk ut på og det var å følge instruksene til Master Jon Lennart. Mange timer gikk med til utføring av teknikker, frikamp og knekking"}, {"t": "En prat med Steffen Persvold", "u": "../2013/06/prat-steffen-persvold/index.html", "k": "Innlegg", "d": "2013-06-15", "x": "Det andre intervjuet var med Steffen Persvold og hans datter Hedda Marie Persvold. De var glade for at Hedda Marie hadde startet på Tae Kwon Do og at hun hadde klart graderingen. Etter at hun hadde startet mente hun at hun hadde blitt flinkere på teknikkene sine. Hedda Marie sa a"}, {"t": "Intervju med  Rebeca Del Rey", "u": "../2013/06/intervju-rebeca-del-rey/index.html", "k": "Innlegg", "d": "2013-06-15", "x": "Rebeca Del Rey som er mor til Adrian Villagran Del Rey sa at etter at Adrian hadde startet på Tae Kwon Do so hadde han lært å være mere konsentrert både hjemme og på skolen. Han har lært disiplin gjennom Tae Kwon Do. Hun var glad for at Adrian går på Tae Kwon Do og hun håper på a"}, {"t": "2013 juni. Gradering Tiger gruppen", "u": "../2013/06/2013-juni-gradering-tiger-gruppen/index.html", "k": "Innlegg", "d": "2013-06-15", "x": "På lørdagen den 15 juni var det gradering for juniorene som er fra alderen mellom 6 og 10 år. Det var 21 stk juniorer som skulle gradere på lørdagen dette er noe som lover bra for framtiden for Ringerike TKD. Det var mange som gledet seg til å gradere og det var noen som gruet se"}, {"t": "Takk for meg", "u": "../2012/06/takk-for-meg/index.html", "k": "Innlegg", "d": "2012-06-21", "x": "Takk for meg! I dag blir siste gang jeg blir å se i Ringerikshallen på en stund. Til høsten reiser jeg til Trondheim for å studere på NTNU. Jeg vil derfor takke for meg så lenge. Å melde meg inn i Ringerike TKD-klubb har vært en av de beste investeringen jeg har gjort. Det har gi"}, {"t": "9.6.2012 Gradring", "u": "../2012/06/9-6-2012-gradring/index.html", "k": "Innlegg", "d": "2012-06-09", "x": "Vi gratulerer ale som besto graderingen. Men det var flere som ikke fikk nytt belte denne gangen. For de som ikke fikk nytt belte så er det bare en ting og gjøre og det er å trene mer. Eller mer riktig til neste gradering. Ta til dere den veiledning dere fikk av master Jon. Og ta"}, {"t": "Medalje i nasjonalt stevne", "u": "../2011/10/medalje-i-nasjonalt-stevne/index.html", "k": "Innlegg", "d": "2011-10-24", "x": "To utøvere fra Ringerike TKD-klubb konkurrert i kamp i Tranbyhallen på nasjonalt stevne i helgen. Det resulterte i en sølv-medalje og en fjerdeplass på henholdsvis Aleksander og Kristoffer Kvannli. Gutta gikk i -55 klassen og det var sju utøvere med i deres klasse, vi gratulerer!"}, {"t": "Medaljedryss på årets første nasjonale stevne!", "u": "../2011/03/medaljedryss-pa-arets-forste-nasjonale-stevne/index.html", "k": "Innlegg", "d": "2011-03-03", "x": "Tre utøvere dro til Mjøndalen i helga til å konkurrere på nasjonalt stevne, og alle tre fikk med seg edelt metall hjem. Anny Aasvang , som konkurrerte i kvinner senior -62 hadde to andre jenter i klassen sin. Kampene ble derfor satt opp som serie. Anny tapte sin første, men vant "}, {"t": "Vellykket barneavslutning og -gradering", "u": "../2010/12/vellykket-barneavslutning-og-gradering/index.html", "k": "Innlegg", "d": "2010-12-20", "x": "Over 70 personer deltok på juleavslutning for barna i helgen. 54 av dem graderte. Juleavslutningen, som gikk fra lørdag til søndag med brus, pizza, trening, nisse, film og gradering ble også i år en stor suksess. I år var også den nystartede \"juniorgruppa\" med. Graderingen som fo"}, {"t": "Rekordmange på TTU Vinterleir i år", "u": "../2010/12/rekordmange-pa-ttu-vinterleir-i-ar/index.html", "k": "Innlegg", "d": "2010-12-20", "x": "Vinterleiren som ble avholdt i Ski helga 10.-12. desember har aldri hatt flere utøvere, og også Ringerike TKD satt ny deltaker-rekord i år. Over 235 mennesker var innom vinterleiren for å trene, gradere eller begge deler og fra vår klubb var det med 26. 16 stykker fra klubben sti"}, {"t": "Ett Sølv i NC IV", "u": "../2010/10/1478/index.html", "k": "Innlegg", "d": "2010-10-28", "x": "I Helgen var det arrangert årets siste Norges Cup og Ringerike TKD-klubb Stilte med tre utøvere. Deltakerne fra vår klubb var: Mikkel Tiller i klassen gutter junior -55 kilo Aleksander Kvannli i klassen gutter ungdom -49 kilo Kristoffer Kvannli (sølv) i klassen gutter ungdom -49 "}, {"t": "NC III kunne ikke gått bedre", "u": "../2010/09/nc-iii-kunne-ikke-gatt-bedre/index.html", "k": "Innlegg", "d": "2010-09-25", "x": "Tre utøvere gikk kamp for Ringerike TKD i Bergen, helgen 18-19 september og kom tilbake med tre medaljer! Utøverne som reiste sammen med Coach Anders Helmen Kristoffer Kvannli (sølv) i klassen Ungdom gutter -49 kilo Aleksander Kvannli (gull) i klassen Ungdom gutter -49 klio Anny "}, {"t": "Full klaff på Ringeriksdagen", "u": "../2010/09/full-klaff-pa-ringeriksdagen/index.html", "k": "Innlegg", "d": "2010-09-17", "x": "Og Ringerike TKD gikk av med seiren for \"beste stand fo lag og foreninger\"! Lørdag 4. september var det et arrangement i byen, kalt \"Ringeriksdagen\" hvor Ringerike skulle vise hva det hadde å by på. Det var tjukt med folk i hele sentrum og det ble satt ny rekord med antall \"stand"}, {"t": "Vel overstått Ringeriksmaraton 2010", "u": "../2010/08/vel-overstatt-ringeriksmaraton/index.html", "k": "Innlegg", "d": "2010-08-30", "x": "For første gang på mange år, stilte Ringerike TKD med lag til Ringeriksmaraton. De fullførte på tiden 3:59:10 i sommersola. Laget besto i utgangspunktet bare av utøvere i klubben, men på grunn av diverse omstendigheter, måtte det lånes litt ekstrahjelp av foreldre og venner av fo"}, {"t": "Lærerikt NC 2", "u": "../2010/04/laererikt-nc-2/index.html", "k": "Innlegg", "d": "2010-04-28", "x": "Ringerike Taekwondos kamplag var i helgen 17-18 april på NC 2 i Oslo, noe som skulle vise seg å bli utfordrende nok. Denne gangen var vi 7 stykker som reiste, hvor 6 konkurrerte. Én av utøverne \"låner\" vi fra Vestoppland fordi han ikke har noe kamplag å gå for der han går. Alle v"}, {"t": "Fin helgesamling på Evje", "u": "../2010/03/fin-helgesamling-pa-evje/index.html", "k": "Innlegg", "d": "2010-03-10", "x": "I helgen var det Weekend-leir i Evje Taekwondo. Én reiste fra vår klubb. Evje TKD-klubb, som er en liten klubb på rundt 30 medlemmer, holder til 60 km nord for Kristiansand i et lite tettsted som heter Evje. Der ble i det i helgen arrangert treningshelg for både farge- og svartbe"}, {"t": "Suksess på Norges Cup!", "u": "../2010/02/suksess-pa-norges-cup/index.html", "k": "Innlegg", "d": "2010-02-27", "x": "Ringerike Taekwondo-klubb vant i helgen tre medaljer i årets første Norges Cup i Gruehallen i Solør. Klubben reiste med fire utøvere og kom hjem med en bronsemedalje, en sølvmedalje og en gullmedalje! Det har gått flere år siden klubben forrige gang stilte opp på NC, men er nå i "}, {"t": "Vi har fått en Master i klubben", "u": "../2010/02/vi-har-fatt-en-master-i-klubben/index.html", "k": "Innlegg", "d": "2010-02-14", "x": "I Januar i år graderte vår kjære Yebio Fecadu til 4. dan i Korea. Han er da historisk som klubbens første master som har trent hos oss fra start. Yebio er æresmedlem i klubben og er klubbens første medlem. Han var med, sammen med GM Cho på å stifte klubben i sin tid og vi er alle"}, {"t": "Reiserbrev fra Sør-Korea", "u": "../2009/08/reiserbrev-fra-sor-korea/index.html", "k": "Innlegg", "d": "2009-08-23", "x": "Vi var seks stykker fra Ringerike Tkd, som i perioden 18. Juli til 2. August var på tur til Sør-Korea. Reisefølget vårt besto av 19 mennesker: 16 nordmenn og 3 dansker. Turen var arrangert av GrandmaDe norske reisende møttes på Gardermoen og dro derfra til Frankfurt, hvor vi møtt"}, {"t": "Juleseminar 2008", "u": "../2008/12/juleseminar-2008/index.html", "k": "Innlegg", "d": "2008-12-28", "x": "Juleavslutning barn og ungdom samt gradering for barn 20-21 desember 2008 Dette er 2 år på rad vi arangerer en litt anerledes juleavslutning. Med trening, overnatting, pizza og film. Denne gangen hadde vi også lagt opp til en gradering for Barnepartiet. Klubben vil få lov til å t"}, {"t": "Juleavslutning og gradering barn og ungdom", "u": "../2008/12/juleavslutning-og-gradering-barn-og-ungdom/index.html", "k": "Innlegg", "d": "2008-12-27", "x": "Dette er 2 år på rad vi arangerer en litt anerledes juleavslutning. Med trening, overnatting, pizza og film. Denne gangen hadde vi også lagt opp til en gradering for Barnepartiet. Klubben vil få lov til å takke de flotte foreldrene som stilte opp og hjalp til. Øystein, Terje og K"}, {"t": "Juleavslutning barn og ungdom samt gradering for barn 20-21 desember", "u": "../2008/12/juleavslutning-barn-ungdom-samt-gradering-barn-20-21-desember/index.html", "k": "Innlegg", "d": "2008-12-21", "x": "Klubben vil få lov til å takke de flotte foreldrene som stilte opp og hjalp til. Øystein, Terje og Kåre. Også stor takk til Nils-Erik som også i år var filmteknikker. Julenissen kom også innom og delte ut gaver til stor fornøyelse for de som deltok. I år var det 55 stykker som de"}, {"t": "2007. Juleseminar", "u": "../2007/12/2007-juleseminar/index.html", "k": "Innlegg", "d": "2007-12-18", "x": "Det hele startet opp lørdag mellom 15.00-16.00. Da kunne de foresatte levere de håpefulle og det ble ordnet med registrering og betaling for deltagelsen. Alle måtte oppbevare sine eiendeler i det ene kampsport rommet frem til etter trening. Totalt så deltok det 68 stykker på jule"}, {"t": "Danseminar Larvik", "u": "../2007/11/danseminar-larvik/index.html", "k": "Innlegg", "d": "2007-11-21", "x": "Roger og Anders tok turen fra Ringerike til Larvik for å delta på danseminar helgen 9. Til 11. September. Vi kom litt før åtte på kvelden og da vi kom var den kamptrening for Larvik-utøverne, og vi slappet litt av mens vi så på den. Vi fikk beskjed om at det hadde blitt endring i"}, {"t": "Fin Yudanjasamling på Hamar", "u": "../2007/10/fin-yudanjasamling-pa-hamar/index.html", "k": "Innlegg", "d": "2007-10-31", "x": "Vi var to stykker som dro gjennom Ringerike TKD. Instruktør-masterne var M. Jan terje Sletten, M. Svein Anderstuen og Hamars egen master M. Are Simensen. Anders og Artjom tok turen til Hamar fredag kveld. Det foregikk da en trening fra 1800 til 2100 som tok for seg litt selvforsv"}, {"t": "NC III i Nannestad", "u": "../2007/10/nc-iii-i-nannestad/index.html", "k": "Innlegg", "d": "2007-10-07", "x": "Den 22. Og 23. September var det vært NC (NorgesCup) i Nannestadhallen på romerike. Øvre Romerike Budoklubb arrangerte det hele og det var i regi av Norges KampsportForbund. Ringerike stilte med 3 utøvere og vi var med i begge grenene. Over 300 utøvere var påmeldt og kom fra 38 k"}, {"t": "Ringerike TKD var med på Muye 2007", "u": "../2007/09/ringerike-tkd-var-med-pa-muje-2007/index.html", "k": "Innlegg", "d": "2007-09-22", "x": "Dette var en perfekt konkurranse for de som ikke hadde hadde vært på å konkurrert på stevner før, en også for den erfarene utøver. Det var lettkontakt kamp og alt hadde en slags uformell ”feeling” over seg. Konkurransen ble holdt av Larvik TKD klubb og ble en stor suksess. Helgen"}, {"t": "Treningshelg med Master Allan Olsen fra Islev TKD", "u": "../2007/09/treningshelg-med-master-allan-olsen-fra-islev-tkd/index.html", "k": "Innlegg", "d": "2007-09-16", "x": "Helgen 8.-9. september arangerte vi sammen med Nittedal TKD en treningshelg med Master Allan Olsen fra Islev TKD. Dette var første gang i klubbens moderne historie at vi forsøkte å dra igang en treningshelg så tidlig i sesongen. Vi var svært spendte på hvor mange som kom til å mø"}, {"t": "Vellykket tur til Danmark", "u": "../2007/03/vellykket-tur-til-danmark/index.html", "k": "Innlegg", "d": "2007-03-12", "x": "Vi kjørte med fly og siden vi var litt seine med å bestille fant vi ut at vi måtte bruke ett flyselskap ned dit og ett annet hjem igjen. Sterling som vi kjørt med til Danmark hadde en veldig firkantet rutine rundt dette med innsjekking av bagasje. Vi hadde sagt ifra om hvor mange"}, {"t": "Reisebrev fra Korea sommeren 2006", "u": "../2007/03/reisebrev-fra-korea-sommeren-2006/index.html", "k": "Innlegg", "d": "2007-03-03", "x": "Tor-Øystein Solberg var på treningstur i Korea 2006. Her kan også du lese om litt av det han opplevde der"}, {"t": "Debug-arrangement", "u": "../arrangementer/2024/debug-arrangement/index.html", "k": "Arrangement", "d": "2024-04-08 10:00", "x": "Det  julecamp med gradering", "u": "../arrangementer/2022/ringerike-tkds-tradisjonelle-julecamp-med-gradering-2/index.html", "k": "Arrangement", "d": "2022-12-17 13:00", "x": "Klubben inviterer i år igjen til julecamp for tiger, barn og ungdom 17.-18. desember. Det blir trening, gradering, filmvisning, overnatting (for de som vil) og annen julehygge! Under finner du invitasjon og program, som kan lastes ned. Påmelding til selve graderingen gjøres via S"}, {"t": "TTU Vinterleir i Ski", "u": "../arrangementer/2022/ttu-vinterleir-i-ski-4/index.html", "k": "Arrangement", "d": "2022-12-02 04:00", "x": "Ski Taekwondo inviterer til Vinterleir for 22. gang, 2.-4.desember på Stil Arene i Ski/Langhus. All informasjon fra Ski Taekwondo finner du i denne invitasjonen Prisen vil være 975,- for hele helgen som inkluderer trening, mat og overnatting for de over 13 år, og 825,- for de und"}, {"t": "NC3 - Poomsae, Frikamp og Hanmadang", "u": "../arrangementer/2022/nc3-poomsae-frikamp-og-hanmadang/index.html", "k": "Arrangement", "d": "2022-09-24 04:00", "x": "Det vil bli konkurrert i Poomsae, Frikamp og Hammandang , så her er det noe for alle! Vi hadde stor interesse for konkurranse i 2019, og håper derfor akkurat DU vil bli med for å styrke motivasjonen! Påmeldingsfristen er 16. september. Selve stevnet er 24. september . MER INFO KO"}, {"t": "TTU Sommerfestival 2022", "u": "../arrangementer/2022/ttu-sommerfestival-2022/index.html", "k": "Arrangement", "d": "2022-07-06 04:00", "x": "Sommerfestival 2022 vil bli arrangert av Kunja Taekwondo Klubb i Nord-Odal. Den vil vare fra onsdag 6. juli til søndag 10. juli . Sommerfestivalen er årets høydepunkt for mange, og vi håper flest mulig har lyst til å delta! Vi hadde stor deltagelse fra klubben ved Evje sin sommer"}, {"t": "NC2 - Poomsae, Frikamp og Hanmadang", "u": "../arrangementer/2022/nc2-poomsae-frikamp-og-hanmadang/index.html", "k": "Arrangement", "d": "2022-04-30 04:00", "x": "Det vil bli konkurrert i Poomsae, Frikamp og Hammandang , så her er det noe for alle! Vi hadde stor interesse for konkurranse i 2019, og håper derfor akkurat DU vil bli med for å styrke motivasjonen! Påmeldingsfristen er 22. april. Selve stevnet er 30. april MER INFO KOMMER Klikk"}, {"t": "NC1 2022 - Poomsae, Frikamp og Hanmadang", "u": "../arrangementer/2022/nc1-2022-poomsae-frikamp-og-hanmadang/index.html", "k": "Arrangement", "d": "2022-03-26 04:00", "x": "Det er tre NC-konkurranser i året, og dette er årets første. Det vil bli konkurrert i Poomsae, Frikamp og Hammandang , så her er det noe for alle! Vi hadde stor interesse for konkurranse i 2019, og håper derfor akkurat DU vil bli med for å styrke motivasjonen! Påmeldingsfristen e"}, {"t": "Årsmøte Ringerike TKD Klubb", "u": "../arrangementer/2022/arsmote-ringerike-tkd-klubb-3/index.html", "k": "Arrangement", "d": "2022-03-08 21:00", "x": "Klubben avholder årsmøtet 08.03.2022 klokken 2100. Vi vil legge ut saksliste på websiden så snart den er klar. Saker som ønsket behandlet sendes per e-post til ringerikektd.com innen 01.03.2022. 2022 Saksliste årsmøte Ringerike TKD 2021 årsmelding RTKD 2021 Resualtat og balanse"}, {"t": "Årsmøte 2022", "u": "../arrangementer/2022/arsmote-2022/index.html", "k": "Arrangement", "d": "2022-02-09 21:00", "x": "Klubben avholder årets årsmøte 08.03.2022 klokken 21:00 i klubbens lokaler i Strandgata 1C. Mer informasjon blir lagt ut på klubbens webside så snart det er klart. Har du saker du ønsker behandlet send dem til ringeriketkd@gmail.com senest 01.03.2022 ."}, {"t": "Romjulsutfordringen i Poomsae og Hanmadang 2021 - E-stevne", "u": "../arrangementer/2021/romjulsutfordringen-i-poomsae-og-hanmadang-2021-e-stevne/index.html", "k": "Arrangement", "d": "2021-12-29 04:00", "x": "Påmeldingsfristen er 24. desember. Selve E-stevnet er 29. desember . E-stevne vil si at vi filmer i Dojangen vår og sender inn. Vi hadde stor interesse for konkurranse i 2019, og håper derfor akkurat DU vil bli med for å styrke motivasjonen! MER INFO KOMMER Klikk her for å komme "}, {"t": "Gradering for Ungdom og voksen", "u": "../arrangementer/2021/gradering-for-ungdom-og-voksen/index.html", "k": "Arrangement", "d": "2021-12-12 14:00", "x": "Klubben inviterer til gradering for ungdom og voksen-gruppen. For ungdom og voksen-gruppen er det satt av tid til teoriprøven fredag 10.12.2021 klokken 1900-2000 i klubbens lokaler. Kan du ikke komme fredag kveld og ta teoriprøven må du sende oss en melding i god tid for en egen "}, {"t": "Gradering for Barn viderekomne", "u": "../arrangementer/2021/gradering-for-barn-viderekomne/index.html", "k": "Arrangement", "d": "2021-12-12 10:00", "x": "Klubben inviterer til gradering for medlemmer på barn viderekomne. Gradering til nye belter er en del av utviklingen i Taekwondo. Denne dagen vil det være mulig å gradere opp til neste beltegrad for gruppens medlemmer. For våre nye medlemmer vil vi informere om at dere kan se på "}, {"t": "Gradering for Barn nye", "u": "../arrangementer/2021/gradering-for-barn-nye/index.html", "k": "Arrangement", "d": "2021-12-11 14:00", "x": "Klubben inviterer til gradering for medlemmer på «Barn nye» (hvitt og gult belte). Gradering til nye belter hvor man kan jobbe seg oppover i beltesystemet er en del av utviklingen i Taekwondo. Denne dagen vil det være mulig å gradere opp til neste beltegrad for gruppens medlemmer"}, {"t": "TTU Vinterleir i Ski", "u": "../arrangementer/2021/ttu-vinterleir-i-ski-3/index.html", "k": "Arrangement", "d": "2021-12-03 04:00", "x": "Ski Taekwondo inviterer igjen til Vinterleir 3-5.desember på Stil Arene i Ski/Langhus. Her finner du informasjon, på Ski Taekwondoklubb sine nettsider Prisen vil være 975,- for hele helgen som inkluderer trening, mat og overnatting. Gradering kommer i tillegg for de som skal. Det"}, {"t": "Dan-seminar i Islev", "u": "../arrangementer/2021/dan-seminar-i-islev/index.html", "k": "Arrangement", "d": "2021-11-05 17:00", "x": "Danseminar, der det forberedes til gradering, eller oppdaterer/inspirerer deg i grunnteknikk og TTU pensum. Det vil bli jobbet med detaljerte utførelses-teknikker, som hjelper deg til fysisk forbedring. Delta i en helg med mange taekwondo-venner! Ankomst på fredag kan avtales med"}, {"t": "Alternativ Ringeriksmaraton", "u": "../arrangementer/2021/ringeriksmaraton-2021/index.html", "k": "Arrangement", "d": "2021-09-25 10:00", "x": "Årets ringeriksmaraton ble dessverre avlyst. Men vi kan jo fortsatt løpe en tur og ha en hyggelig samling i klubblokalene på kvelden. Klubben inviterer til en løpetur på Schjongslund i Hønefoss. Her går det en fin treningsløype langs elva. Vi møtes klokken 1400 og tar en felles s"}, {"t": "Gradering for Barn 2", "u": "../arrangementer/2021/gradering-for-barn-2-2/index.html", "k": "Arrangement", "d": "2021-06-17 18:15", "x": "Vi avslutter sesongen med gradering for Barn 2. 17.juni. Vi anbefaler at barna har deltatt på minimum 10 treninger for å gradere. Er du usikker på hvor mye ditt barn ha trent så ta kontakt med en av instruktørene. Barn 2 er de som trener tirsdag og torsdag 1815-1915 . Oppmøte som"}, {"t": "Gradering for tigergruppen", "u": "../arrangementer/2021/gradering-for-tigergruppen/index.html", "k": "Arrangement", "d": "2021-06-16 18:15", "x": "Vi avslutter sesongen med gradering for alle på tigergruppen som ønsker å gradere til nytt belte. Dette vil være istedenfor siste trening for sesongen i Ringerikshallen. Oppmøte som til vanlig trening klokken 1815 . Påmelding gjøres via påmeldingsskjemaet nedenfor. Graderingen ko"}, {"t": "Gradering gruppe under 20 år", "u": "../arrangementer/2021/gradering-gruppe-under-20-ar/index.html", "k": "Arrangement", "d": "2021-06-12 14:00", "x": "Da er det snart sommer og tid for gradering. Gradering for gruppen under 20 år. (Dere som nå trener tirsdag og torsdag 1930-2045) vil bli i klubbens nye lokaler lørdag 12.juni klokken 1400 - 1700. De nye lokalene ligger under bybrua ved fossen. Inngangen er fra motsatt side som g"}, {"t": "Gradering barn 1", "u": "../arrangementer/2021/gradering-barn-1-2/index.html", "k": "Arrangement", "d": "2021-06-12 10:00", "x": "Gradering for barn 1 vil bli i klubbens nye lokaler lørdag 12.juni klokken 1000-1200 . De nye lokalene ligger under bybrua ved fossen. Inngangen er fra motsatt side som gledeshuset. Adresse er Strandgata 1 c . Påmelding gjøres via påmeldingsskjemaet nedenfor og graderingen koster"}, {"t": "Digitalt årsmøte", "u": "../arrangementer/2021/digitalt-arsmote-ringerike-tkd-klubb-2/index.html", "k": "Arrangement", "d": "2021-04-11 19:30", "x": "Klubben gjennomfører i år et digitalt årsmøte. Påmelding kan gjøres her: https://isonen.com/event/cklwjcrnkm0lv0d68323rgbfp Årsmøtet gjennomføres via Teams og de som melder seg på får tilsendt en link til møtet 30 minutter før årsmøtet åpnes. Påmeldingsfrist 05.04.2021. saker som"}, {"t": "1. trening 2021", "u": "../arrangementer/2021/1-trening-2021/index.html", "k": "Arrangement", "d": "2021-01-25 18:15", "x": "Klubben har etter regjeringens pressekonferanse den 18.01.2021 hatt et kort online styremøte og kommet til konklusjonen at selv om vi nå har lov til å åpne opp treningen for de under 20 år fra 19.01.2021 så venter vi noen få dager til. Klubben starter sesongen for fult mandag 25."}, {"t": "Gradering for Tiger-gruppen", "u": "../arrangementer/2020/gradering-for-tiger-gruppen/index.html", "k": "Arrangement", "d": "2020-12-16 18:15", "x": "Med forbehold om at ting ikke endrer seg med tanke på til Korona-pandemien så vil klubben gjennomføre gradering for klubbens medlemmer.Graderingen vil foregå istedenfor vanlig trening. Det vil ikke være tilbud om trening denne dagen for de som ikke ønsker å gradere. Graderingen v"}, {"t": "Gradering for Ungdom og voksen 2", "u": "../arrangementer/2020/gradering-for-ungdom-og-voksen-2/index.html", "k": "Arrangement", "d": "2020-12-15 19:30", "x": "Med forbehold om at ting ikke endrer seg med tanke på til Korona-pandemien så vil klubben gjennomføre gradering for klubbens medlemmer.Graderingen vil foregå istedenfor van g enten i kamp- eller poomsekonkurranse, eller bare har lyst "}, {"t": "Årsmøte RTKD", "u": "../arrangementer/2019/arsmote-rtkd/index.html", "k": "Arrangement", "d": "2019-03-31 12:00", "x": "Sakslisten til årsmøtet er nå klart. Årsmøtet starter opp klokken 1200. Rett etter avsluttet årsmøte vil det bli jobbet dugnad frem til ca 1600 hvor det vil være bespisning med pizza. Det er mulig å jobbe videre etter klokken 1600 for de som måtte ønske det :). Komplett saksliste"}, {"t": "Norgescup 1 og Østlandscup", "u": "../arrangementer/2019/norgescup-1-og-ostlandscup/index.html", "k": "Arrangement", "d": "2019-02-23 08:00", "x": "Lørdag 23. februar arrangeres Norges Cup (NC) 1 og Østlandscup. Det avholdes i Bygdøhus i Bygdøy, Oslo. Vi deltar med utøvere i Ungdom- og Juniorklassen, én A-utøver og noen B-utøvere. Og disse er: Navn Beltegrad Gradklasse Aldersklasse A eller B Ida Helen 3. cup Cup høy Junior B"}, {"t": "Trening og konkurranse-innføring med Master Nils Hoffman", "u": "../arrangementer/2019/trening-konkurranse-innforing-med-master-nils-hoffman/index.html", "k": "Arrangement", "d": "2019-02-16 10:00", "x": "Lørdag 16.2 kommer Nils fra Hamar TKD klubb for å holde en treningsdag i Ringerike TKD klubb. Nils er leder for Dommer-komiteen i Norge og har mye erfaring fra konkurranse. Vi har invitert han til klubben for å ha en treningsdag med fokus på konkurranse-poomse. Vi legger opp til "}, {"t": "Gradering for ungdom- og voksenparti", "u": "../arrangementer/2018/gradering-for-ungdom-og-voksenparti/index.html", "k": "Arrangement", "d": "2018-12-18 18:30", "x": "Tirsdag 18. desember er det duket for gradering for ungdom- og voksenparti. Påmelding gjøres ved å møte opp for å ta teoriprøve. Se egen hendelse . For gult belte til om med blått belte med stripe kr 400. For rødt belte med striper 450."}, {"t": "Teoriprøve for ungdom- og voksenparti", "u": "../arrangementer/2018/teoriprove-for-ungdom-og-voksenparti/index.html", "k": "Arrangement", "d": "2018-12-13 18:30", "x":
