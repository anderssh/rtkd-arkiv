U Sommerfestival 2018", "u": "../arrangementer/2018/ttu-sommerfestival-2018/index.html", "k": "Arrangement", "d": "2018-06-30 08:00", "x": "TTU inviterer til den tradisjonsrike sommerfestivalen. I år holdes den på Elverum videregående skole (ELVIS) fra lørdag 30.juni til onsdag 4. juli. Invitasjonen med informasjon om leir, priser og påmelding finner du HER! TTU informerer om at det er satt opp enda flere treninger i"}, {"t": "Gradering Ungdom og voksen", "u": "../arrangementer/2018/gradering-ungdom-og-voksen/index.html", "k": "Arrangement", "d": "2018-06-23 12:00", "x": "Graderingen vil bli gjennomført lørdag 23.juni klokken 1200-1700. Om vi holder på helt til klokken 1700 er avhenig av hvor mange som skal gradere. Dette har vi ikke svar på før det nærmer seg. Fysisk test avholdes som en del av graderingen. Planker skal knekkes i henholdt til klu"}, {"t": "Gradering Barn.", "u": "../arrangementer/2018/gradering-barn-2/index.html", "k": "Arrangement", "d": "2018-06-21 18:15", "x": "Gradering for barn blir 21.juni. Dette blir også sesong avslutning for barne gruppen. Vi starter opp klokken 18.15 og forventer å være ferdig ca klokken 2030. Graderingen koster kroner 350 og inkluderer nytt belte/stripe og diplom. Påmelding gjøres under treningen den 12.juni. På"}, {"t": "Gradering Tiger.", "u": "../arrangementer/2018/gradering-tiger/index.html", "k": "Arrangement", "d": "2018-06-20 18:15", "x": "Gradering for tiger blir 20.juni og blir også sesong avslutning for gruppen. Graderingen starter opp klokken 18.15 og vi regner med å være ferdig til klokken 20.00. Påmelding til graderingen gjøres på trening den 13.juni mens gruppen trener. Pris for gradering inkludert diplom og"}, {"t": "Påmelding gradering Tiger.", "u": "../arrangementer/2018/pamelding-gradering-tiger/index.html", "k": "Arrangement", "d": "2018-06-13 18:15", "x": "Påmelding til graderingen for Tiger gruppen gjøres på trening den 13.juni mens gruppen trener. Pris for gradering inkludert diplom og nytt belte er kr 350,- og kan betales, kontant, kort eller på vips. Graderingen foregår onsdag 20 juni i tidsrommet 18.15 - ca klokken 20.00."}, {"t": "Påmelding til og teoriprøve for gradering Ungdom og voksne.", "u": "../arrangementer/2018/pamelding-og-teoriprove-gradering-ungdom-og-voksne/index.html", "k": "Arrangement", "d": "2018-06-12 19:30", "x": "For de som ønsker å gradere på ungdom og voksen partiet så er det påmelding og teoriprøve tirsdag 12.juni klokken 1930. Graderingen koster kroner 400 for beltegrad hvitt tilogmed blått med stripe. og kr 450 for rødt belte og høyere. Dette betales samtidig som påmeling (utlevering"}, {"t": "Påmelding gradering Barn.", "u": "../arrangementer/2018/pamelding-gradering-barn/index.html", "k": "Arrangement", "d": "2018-06-12 18:00", "x": "Påmelding gjøres under treningen den 12.juni. Påmeldigen er åpen fra 1800-1915. Det kan betales med kontant, kort og vips. Graderingen koster kroner 350 og inkluderer nytt belte/stripe og diplom."}, {"t": "Dan-seminar i Islev TKD-klubb", "u": "../arrangementer/2018/dan-seminar-i-islev-tkd-klubb/index.html", "k": "Arrangement", "d": "2018-05-18 04:00", "x": "TTU og Islev Taekwondo i Danmark inviterer til Dansamling 18.-20. mai 2018. Samlingen er åpen for alle med rødt belte (4.cup) eller høyere. Påmeldingsfrist er 13. mai og det er flere instruktører som fra klubben som skal reise. Gi beskjed til en instruktør hvis du ønsker å være m"}, {"t": "Årsmøte Ringerike TKD klubb", "u": "../arrangementer/2018/arsmote-ringerike-tkd-klubb/index.html", "k": "Arrangement", "d": "2018-03-17 18:00", "x": "Årsmøtet for Ringerike TKD klubb avholdes i klubbens nye lokaler i Nordre Brukar lørdag 17.3.2018 klokken 1800. Det serveres kaffe, brus og noe enkelt å bite i. Det vil også være mulighet for å titte på status fremdrift nye lokaler for de som ikke har tatt turen hit tidligere. Fr"}, {"t": "Dugnad i nye lokaler", "u": "../arrangementer/2018/dugnad-nye-lokaler-2/index.html", "k": "Arrangement", "d": "2018-02-24 10:00", "x": "Geir skal jobbe dugnad. Vil du bli med å jobbe? Ta kontakt med Geir per SMS til 91699587. Alle kan bidra!, har du mulighet til å stille med bil og henger for å kjøre et lass med avfall til trollmyra så er det topp. Ellers så er det snekning og litt murearbeid / sparkling m.m som "}, {"t": "Norgescup 1 og Østlandscup på Jessheim", "u": "../arrangementer/2018/norgescup-1-ostlandscup-pa-jessheim/index.html", "k": "Arrangement", "d": "2018-02-24 04:00", "x": "24. februar arrangeres den første Norgescupen i år på Jessheim. Jeg skal stikke en tur inn og se på og inviterer alle som vil inn og se konkurranse med! :) Ring meg hvis det er noe dere lurer på, du mangler skyss, eller om det er noen med ekstra seter i en bil. Bare si ifra! Det "}, {"t": "Dugnad i nye lokaler.", "u": "../arrangementer/2018/dugnad-nye-lokaler/index.html", "k": "Arrangement", "d": "2018-01-06 10:00", "x": "Klubben jobber med å pusse opp nye lokaler i Nordre Brukar. Vi har kommet langt på prosjektet, men det er fortsatt endel arbeid som gjenstår. Vi håper at du også kan bli med å jobbe en økt. Kan du bli med så ta kontakt med Reinhardt på SMS 900 25 944"}, {"t": "Trening 2018 er i gang.", "u": "../arrangementer/2018/trening-2018-gang/index.html", "k": "Arrangement", "d": "2018-01-02 18:00", "x": "Trenings sesongen 2018 er i gang. Last ned 1/2 års planen her. 2018.12.31 ansvardeling vår RTKKD"}, {"t": "Gradering ungdom og voksen gruppen", "u": "../arrangementer/2017/gradering-ungdom-voksen-gruppen/index.html", "k": "Arrangement", "d": "2017-12-19 17:00", "x": "Påmelding. 14.12.2017 Påmelding og teoriprøve for medlemmer på Ungdom og voksen. Påmelding og betaling foregår denne dato ved oppmøte i Ringerikshallen i kampsport rommet nede kl. 1800. Skal du gradere, så setter du av dato og klokkeslett! Har du noe annet viktig som foregår denn"}, {"t": "Julecamp med gradering Barn og Tiger", "u": "../arrangementer/2017/juleseminar-gradering-barn-tiger/index.html", "k": "Arrangement", "d": "2017-12-16 12:00", "x": "Tradisjonen tro vil Ringerike TKD klubb avholde julecamp for barna våre med trening, konkuranse, pizza og overnatting i hallen. Vi hadde en veldig fin camp i 2016 med 65 deltagere. Kanskje vi blir flere i år? Du kan laste ned invitasjonen i pdf her: 2017 program juleseminar barn "}, {"t": "Teoriprøve / Påmelding ungdom og voksen", "u": "../arrangementer/2017/teoriprove-pamelding-ungdom-voksen/index.html", "k": "Arrangement", "d": "2017-12-14 18:00", "x": "Påmelding. 14.12.2017 Påmelding og teoriprøve for medlemmer på Ungdom og voksen. Påmelding og betaling foregår denne dato ved oppmøte i Ringerikshallen i kampsport rommet nede kl. 1800. Skal du gradere, så setter du av dato og klokkeslett! Har du noe annet viktig som foregår denn"}, {"t": "20-års jubileum og TTU treningshelg for Larvik Taekwondo", "u": "../arrangementer/2017/20-ars-jubileum-ttu-treningshelg-larvik-taekwondo/index.html", "k": "Arrangement", "d": "2017-09-22 04:00", "x": "Larvik Taekwondoklubb feirer i år 20-års jubileum. De arrangerer TTU Treningshelg kombinert med 20-års jubileums-feiring for klubben i idylliske Stavern. Informasjon om helgen, og påmelding finnes på TTUs hjemmesider . Nøl heller ikke med å ta kontakt med en instruktør hvis du er"}, {"t": "TTU Instruktørseminar Poomse", "u": "../arrangementer/2017/ttu-instruktorseminar-poomse/index.html", "k": "Arrangement", "d": "2017-09-15 04:00", "x": "Det er med glæde at kunne invitere til en weekend med Poomse som tema. Denne weekend vil give deltageren mulighed for at lære nye aspekter af Poomse. Deltagerne vil stifte bekendskab med de fleste basale mønster færdigheder, samt hjælpe den enkelte utøver / Instruktør med flere v"}, {"t": "Oppstart trening Høsten 2017.", "u": "../arrangementer/2017/oppstart-trening-hosten-2017/index.html", "k": "Arrangement", "d": "2017-08-15 18:15", "x": "Vi starter opp sesongen Høsten 2017 for fult tirsdag 15. august. Nytt av sesongen er at Tiger gruppen flyttes til onsdager og er fra klokken 18.15 - 19.15. Vi åpner også en ny time på onsdager fra 1930-2100 med fokus på TKD kamp. Det vil bli kamp teknisk trening hovedsakelig og e"}, {"t": "Gradering Ungdom og voksen", "u": "../arrangementer/2017/arrangementergradering-ungdom-voksen/index.html", "k": "Arrangement", "d": "2017-06-18 12:00", "x": "Gradering for ungdom og voksen gruppen. Program og info kommer når det nærmer seg."}, {"t": "Gradering Tiger og Barn", "u": "../arrangementer/2017/gradering-tiger-barn-2/index.html", "k": "Arrangement", "d": "2017-06-17 10:00", "x": "Gradering for Tiger og barne gruppen. Program er sendt ut på e-post."}, {"t": "Årsmøte 2017", "u": "../arrangementer/2017/arsmote-2017/index.html", "k": "Arrangement", "d": "2017-03-24 18:00", "x": "Årsmøtet vil bli avholdt 24.3.2017 kl 18.00 i Nordre Brukar. Det er enkel forhold i lokalet årsmøtet skal avholdes og det er ikke toalett i lokalene. Ta gjerne på deg varmt tøy når du kommer. Frist for å melde saker gikk ut 15.3.2017. Fullstendig saksliste kan leses her: 2017 års"}, {"t": "Vinterferie.", "u": "../arrangementer/2017/vinterferie/index.html", "k": "Arrangement", "d": "2017-02-26 08:00", "x": "Da er det vinterferie i Hønefoss. Ingen trening for Tiger og barn 27.2 - 2.3. For Ungdom Voksen gruppen går treninger som vanlig mandag, tirsdag og torsdag."}, {"t": "TTU Nyttårsleir i Hoveddojang", "u": "../arrangementer/2017/ttu-nyttarsleir-hoveddojang/index.html", "k": "Arrangement", "d": "2017-01-20 18:00", "x": "Bli med å få en forrykende flott start på Taekwondoåret med Nyttårsleir i TTU Hoveddojang på Bruvik utenfor Bergen. Det blir mye trening, Dangradering, Cupgradering, god mat, gode venner og kjempehygglig for både barn og voksne. Her finner du facebook-arrangementet. Ta kontakt me"}, {"t": "Ringerike TKD julecamp", "u": "../arrangementer/2016/ringerike-tkd-vintercamp/index.html", "k": "Arrangement", "d": "2016-12-10 11:00", "x": "Klubben arrangerer også i år vår populære vinter-camp med trening, overnatting, pizza og brus, nisse på besøk, konkurranser og gradering. Nytt i år er at vi vil forsøke å avholde en konkurranse i poomse for de med grønt belte eller høyere. Her er det bare å melde seg på!, i fjor "}, {"t": "Gradering for Ungdom og voksne", "u": "../arrangementer/2016/gradering-ungdom-voksne-3/index.html", "k": "Arrangement", "d": "2016-12-08 17:00", "x": "Gradering for ungdom og voksne består av 3 deler. Først skal teoriprøve avlegges for å vise hvor mye man har lært, og hvilken innsats man legger ned i å lære seg pensum. For alle beltegrader med unntak av graden under sort belte så benyttes teoriprøven i totalvurderingen av kandi"}, {"t": "TTU vinterleir", "u": "../arrangementer/2016/ttu-vinterleir/index.html", "k": "Arrangement", "d": "2016-12-02 18:00", "x": "TTU Vinterleir arrangeres for 18. gang. Du skal vell være med? Klubben sender felles påmelding inn til TTU. Klubbens medlemmer melder seg på via skjema her på hjemmesiden. Betaling kan gjøres til klubbens konto Bank: 1594 46 60 469 så sørger vi for felles betaling inn til TTU. Pr"}, {"t": "Dan seminar Ringerike TKD", "u": "../arrangementer/2016/dan-seminar-ringerike-tkd/index.html", "k": "Arrangement", "d": "2016-11-18 18:00", "x": "Ringerike TKD har i samarbeid med TTU gleden av å invitere til Dan seminar. Vi legger opp helgen med fokus på de som skal gradere og derfor spesielt fokus på teknikker som er viktige på Dan gradering. Last ned programmet her: 2016-dan-seminar-rtkd Klikk her for påmelding!"}, {"t": "Trenings helg i Nittedal TKD med Anna Kim", "u": "../arrangementer/2016/trenings-helg-nittedal-tkd-anna-kim/index.html", "k": "Arrangement", "d": "2016-09-24 08:00", "x": "Nittedal TKD klubb inviterer til en trenings-helg med Anna Kim. Mer info på Nittedal sin facebook side."}, {"t": "Oppstart trening", "u": "../arrangementer/2016/oppstart-trening-2/index.html", "k": "Arrangement", "d": "2016-08-15 04:00", "x": "15. august starter vi opp høst sesongen."}, {"t": "Gradering ungdom og voksne", "u": "../arrangementer/2016/gradering-ungdom-voksne-2/index.html", "k": "Arrangement", "d": "2016-06-12 12:00", "x": "Gradering for ungdom og voksen-gruppen. Gradering for ungdom og voksen gruppen foregår søndag 12.6.2016. Skal du gradere må du melde deg på via hjemmesiden. Betalingen for graderingen foregår i klubben tirsdag 7.6. Teoriprøven skal avlegges samme dag. Viktige tidspunkter og info "}, {"t": "Gradering barn", "u": "../arrangementer/2016/gradering-barn/index.html", "k": "Arrangement", "d": "2016-06-11 13:00", "x": "Gradering for barnepartiet. (trening tirsdag og torsdag 1830-1930) Vi inviterer til gradering for barne partiet. Påmelding kun via hjemmesiden her. Pris for gradering er kr 300,- 50 % rabatt for nr to fra samme familie. Betaling foregår tirsdag 6.juni. Dette så instruktørene kan "}, {"t": "Gradering Tiger-gruppen", "u": "../arrangementer/2016/gradering-tiger-barn/index.html", "k": "Arrangement", "d": "2016-06-11 10:00", "x": "Gradering for Tiger-gruppen. (Treningstid mandager 1800-1900) Vi inviterer til gradering for vår tøffeste gruppe. Påmelding kun via hjemmesiden her. Pris for gradering er kr 300,- 50 % rabatt for nr to fra samme familie. Betaling foregår mandag 6.juni. Dette så instruktørene kan "}, {"t": "Yudanjasamling i Evje", "u": "../arrangementer/2016/yudanjasamling-i-evje/index.html", "k": "Arrangement", "d": "2016-04-15 04:00", "x": "Evje Taekwondo-klubb inviterer til Yudanjasamling. Det vil også være anledning for både fargebleter og barn til å delta. Denne helgen feirer Evje Taekwondo-klubb 20 år, og det vil selvsagt bli feiret med stor fest. Mer informasjon om og invitasjon kommer etter hvert men sett alle"}, {"t": "Årsmøte RTKD 2016", "u": "../arrangementer/2016/arsmote-rtkd-2016/index.html", "k": "Arrangement", "d": "2016-03-30 19:00", "x": "Ringerike Taekwondo klubb kaller inn til årsmøte. Tidspunkt: 30.3.2016. kl 19.00. Sted: Goman bakeriet Hønefoss. Gullagata 3. Saker som ønskes behandlet sendes styret v/Leder per e-post innen 22.3.2016 Komplett saksliste med vedlegg finner du her. Inkalling Årsmøte RTKD 2016 komp"}, {"t": "Instruktørsemniar og Kodanjasamling på Bruvik", "u": "../arrangementer/2016/instruktorsemniar-kodanjasamling-pa-bruvik/index.html", "k": "Arrangement", "d": "2016-03-11 04:00", "x": "TTU inviterer til Instruktørseminar og Kodanjasamling i TTU hoveddojang på Bruvik helgen 11-13 mars 2016 Last ned invitasjon her , eller se ttu.no"}, {"t": "NC 1 og ØC 1", "u": "../arrangementer/2016/nc-1-oc-1/index.html", "k": "Arrangement", "d": "2016-02-27 19:00", "x": "Øvre Romerike Budo senter i sammarbeid med Norges Kampsport forbund inviterer til NC 1 og ØC 1. Mer info og program finner du på www.kampsport.no"}, {"t": "Vinterleir i TTU Hoveddojang", "u": "../arrangementer/2016/vinterleir-ttu-hoveddojang/index.html", "k": "Arrangement", "d": "2016-01-22 04:00", "x": "Årets vinterleir i TTUs hoveddojang på Bruvik, Osterøy finner sted 22.-24. januar og er en flott sjnse til å trene Taekwondo med andre utenfor klubben og stifte nye bekjentskaper. Arrangementet er åpent for alle aldre og beltegrader. Har du lyst til å dra? Prat med en av instrukt"}, {"t": "Oppstart trening", "u": "../arrangementer/2016/oppstart-trening/index.html", "k": "Arrangement", "d": "2016-01-04 18:00", "x": "mandag 4. januar starter vi 2016 sesongen. Tiger trening 1800, og ungdom voksen poomse trening etterpå."}, {"t": "Juleavslutning og gradering Barn og Tiger", "u": "../arrangementer/2015/juleavslutning-og-gradering-barn-og-tiger/index.html", "k": "Arrangement", "d": "2015-12-19 12:00", "x": "Ringerike TKD inviterer alle medlemmer på barne- og tiger gruppen til juleavslutning og gradering. Bli med på en juleavslutning med trening, pizza, film og overnatting i hallen. Sist år var det 55 barn som overnattet i Ringerikshallen. Bli med da vel! Mer info og program blir lag"}, {"t": "Gradering ungdom og voksne.", "u": "../arrangementer/2015/gradering-ungdom-voksne/index.html", "k": "Arrangement", "d": "2015-12-17 18:30", "x": "Gradering ungdom og voksen 1830-2100."}, {"t": "Påmelding gradering ungdom og voksne.", "u": "../arrangementer/2015/pamelding-gradering-ungdom-voksne/index.html", "k": "Arrangement", "d": "2015-12-08 18:00", "x": "Husk påmelding til gradering for ungdom og voksne kl 1800. Teoriprøven utleveres ved påmelding. Betaling skal også gjøres samtidig. Gradering koster kr 450, 2 fra samme familie 600, 3 fra samme familie 800. Noe uklart så ta kontakt med Geir."}, {"t": "TTU Vinterleir i Ski", "u": "../arrangementer/2015/ttu-vinterleir-i-ski/index.html", "k": "Arrangement", "d": "2015-12-04 04:00", "x": "Ski Taekwondo ønsker velkommen til TTU vinterleir på Langhus. Det er 17. gang det arrangeres vinterleir på Langhus. Detaljert program kommer etter hvert, men sett allerede nå av helga, så vi kan reise en stor gjeng fra klubben!"}, {"t": "NM i kamp og mønster", "u": "../arrangementer/2015/nm-i-kamp-og-monster/index.html", "k": "Arrangement", "d": "2015-11-21 04:00", "x": "NM i mønster og kamp arrangeres av NKF og Stjørdal Atletklubb i Stjørdalshallen, 21.november. Det skal kåres Norgesmestre og deles ut Kongepokal og andre priser. Det er 30 år siden første NM i Taekwondo WTF ble avholdt, og jubileet skal feires . For å delta på NM må man kvalifise"}, {"t": "Danseminar i Ski", "u": "../arrangementer/2015/danseminar-i-ski/index.html", "k": "Arrangement", "d": "2015-11-13 04:00", "x": "Ski Taekwondoklubb inviterer til Dan-seminar i sin Dojang 13-15 november 2015. Instruktører blir master Svein Andersstuen, 7.dan og master Morten Andersstuen, 5.dan. Dette er en mulighet for alle utøvere med grad 2.cup (rødt belte med to striper) eller høyere til å få en skikkeli"}, {"t": "Instruktørseminar i TTU Hoveddojang", "u": "../arrangementer/2015/instruktor-seminar/index.html", "k": "Arrangement", "d": "2015-11-06 04:00", "x": "I oktober blir det avholdt instruktørseminar for alle TTUs instruktører. Seminaret blir på TTU hoveddojang på Bruvik, Osterøy. Mer informasjon og invitasjon kommer så snart TTU har det klart."}, {"t": "Yudanjasamling Hamar TKD", "u": "../arrangementer/2015/yudanjasamling-hamar-tkd/index.html", "k": "Arrangement", "d": "2015-10-30 04:00", "x": "Hamar Taekwondoklubb invitererer til Yudanjasamling i helgen 30.oktober til 1. november 2015. Samlingen er åpen for alle med 2.cup og høyere grad."}, {"t": "Ringeriksdagen", "u": "../arrangementer/2015/ringeriksdagen/index.html", "k": "Arrangement", "d": "2015-09-05 04:00", "x": "Det er igjen duket for Ringeriksdagen i Hønefoss sentrum og som flere år på rad skal Ringerike TKD ha stand. Datoen er 5. september og vi skal stå utenfor VIC Tronrud, der vi har stått flere ganger før. Arrangementet foregår i tidsrommet 10:00 - 14:30 og standen må være bemannet "}, {"t": "Sensommertrening med TTU", "u": "../arrangementer/2015/sensommer-trening/index.html", "k": "Arrangement", "d": "2015-08-28 04:00", "x": "Grandmaster Cho og TTU inviterer til sensommtrening i Hoveddojangen på Osterøy. Bli med på en fantastisk flott start på høsten, med god trening, ny lærdom, nye venner og en flott opplevelse på tampen av sommeren. Om du ønsker å delta, hør med oss på trening. Jo flere jo bedre! Pr"}, {"t": "Grandmaster Cho's Sommerfestival", "u": "../arrangementer/2015/grandmaster-chos-sommerfestival/index.html", "k": "Arrangement", "d": "2015-06-28 04:00", "x": "Det blir et variert program som passer for alle - til og med foreldre/ledsagere som ikke trener taekwondo får et eget opplegg. Vi oppfordrer klubbene til allerede nå å planlegge oppvisning og muje konkurransen - en uhøytidlig tradisjonell konkurranse med mye ære å vinne. I 2015 f"}, {"t": "Grandmaster Cho's Barnefestival", "u": "../arrangementer/2015/grandmaster-cho-barnefestival/index.html", "k": "Arrangement", "d": "2015-06-26 04:00", "x": "Grandmaster Cho Summerfestival starter med Barnefestival - en treninghelg for barn mellom 7 og 14 år. Her vil barna få all fokus fra instruktører og ledere. Klubbene tar selv med ledsagere/foreldre. Sommerfestivalen starter mandag, men selvsagt er hele familien velkommen som vanl"}, {"t": "Spinning på Move", "u": "../arrangementer/2012/spinning-pa-move/index.html", "k": "Arrangement", "d": "2012-05-15 04:00", "x": "Fredag den 15. mai blir det spinning på Move, for medlemmer av ungdom og voksen gruppen. Det er max plass til 26 deltagere så det er bare å melde seg på. Vi hadde planlagt dette litt tideligere, men det kom noen småting i veien. Men nå er dato satt. Påmeldingsliste blir hengt opp"}, {"t": "Trening med Grandmaster Cho i Nittedal og Ringerike", "u": "../arrangementer/2012/trening-med-grandmaster-cho-i-nittedal-og-ringerike/index.html", "k": "Arrangement", "d": "2012-02-10 08:00", "x": "Programmet kan lastes ned her: 2012 Trening med Grandmaster Cho Nittedal og RTKD.pdf Nittedal og Ringerike TKD inviterer til en treningshelg med GM Cho. Klubbene samarbeider nok en gang om å få GM Cho på besøk. Bli med du også da vell."}, {"t": "Trening med Grandmast Cho", "u": "../arrangementer/2011/trening-med-grandmast-cho/index.html", "k": "Arrangement", "d": "2011-03-11 04:00", "x": "Ringerike og Nittedal TKD inviterer til trening med Grandmaster Cho i helgen 11. - 13. mars. Fredag og lørdag er det trening i Nittedal og søndag er det trening i Ringerikshallen. Alle er velkomne til å delta. Også ikke klubb-medlemmer. Ta kontakt og bli med. Invitasjon og progra"}, {"t": "Seminar med Nuno Damaso Nittedal og Ringerike TKD", "u": "../arrangementer/2010/seminar-med-nuno-damaso-nittedal-og-ringerike-tkd/index.html", "k": "Arrangement", "d": "2010-09-04 04:00", "x": "Nittedal og Ringerike TKD inviterer til en treningshelg med Nuno Damaso. Lørdag er det trening i Nittedal og Søndag er det trening i Hønefoss. Kom og bli med du også da vell. Alle er velkommen uansett beltegrad og klubb. Last ned invitasjonen her: 2010 Nuno Damaso Ringerike TKD.p"}, {"t": "Trening og gradering med Master Jon Lenart", "u": "../arrangementer/2010/trening-og-gradering-med-master-jon-lenart/index.html", "k": "Arrangement", "d": "2010-05-29 08:00", "x": "Klubben inviterer til trening og kup gradering med master Jon. Legg merke til dato for teori prøve for dere som har fylt 12 år. Program finner du her"}, {"t": "Treningshelg med Grandmaster Cho", "u": "../arrangementer/2010/treningshelg-med-grandmaster-cho/index.html", "k": "Arrangement", "d": "2010-01-30 04:00", "x": "Ringerike og Nittedal TKD inviterer til en trenings helg med grandmaster Cho Woon Sup. Klubbene sammarbeider enda en gang om å få vår grandmaster på besøk slik at alle klubbenes medlemmer har mulighet til å trene med vår grandmaster. Helgen er åpen for utøvere som ikke er medlem "}, {"t": "La oss dra og spise pizza!", "u": "../arrangementer/2009/la-oss-dra-og-spise-pizza/index.html", "k": "Arrangement", "d": "2009-02-20 20:00", "x": "Medlemmer av ungdom- og voksenpartiet inviteres herved til pizza-kveld fredag den 20. februar klokken 20:00 hos Peppes Pizza. Som kompensasjon for at det ikke ble noe julebord i 2008 så tar Ringerike TKD med alle som trener på ungdom- og voksenpartiet ut for å spise pizza! Vi har"}, {"t": "TTU Vinterleir 2008", "u": "../arrangementer/2008/ttu-vinterleir-2008/index.html", "k": "Arrangement", "d": "2008-12-12 04:00", "x": "TTU vinterleir arangeres i år 12 - 14 Desember. Som \"vanlig\" er det Ski TKD som skal arrangere leiren. Hvilken instruktører som kommer ser du i invitasjonen. Det som er sikkert er at vi håper at mange fra Ringerike TKD blir med på leiren også i år. Den starter fredag kveld og avs"}, {"t": "Landslagstrener Master Thomas Jensen Besøker klubben", "u": "../arrangementer/2007/landslagstrener-master-thomas-jensen-besoker-klubben/index.html", "k": "Arrangement", "d": "2007-10-06 04:00", "x": "Master Thomas Jensen kommer på klubbesøk til Ringerike TKD for å trene oss i poomse, grunnleggende teknikker og teknikkforståelse knyttet oppimot poomse. Vi legger opp til en treningsøkt for Barn og to økter for de litt eldre. Vi håper mange dukker opp og blir med å trene da dett"}, {"t": "Treningshelg med Master Allan Olsen (5 Dan)", "u": "../arrangementer/2007/treningshelg-med-master-allan-olsen-5-dan/index.html", "k": "Arrangement", "d": "2007-09-08 04:00", "x": "Ringerike TKD inviterer i sammarbeid med Nittedal TKD til en treningshelg med Master Allan Olsen fra Islev TKD i Danmark. Vi håper dette kan bli en helg med morsom trening som en \"kick off\" på høst sesongen. Alle er velkomene. Invitasjonen finner du her"}, {"t": "TTU Dan-seminar Ringerike", "u": "../arrangementer/2007/ttu-dan-seminar-ringerike/index.html", "k": "Arrangement", "d": "2007-06-09 04:00", "x": "Ringerike TKD er vertskap for TTU Dan seminar. Instruktører blir Grandmaster Cho Woon Sup og Master Jan Terje Sletten. Programmet kan du laste ned her."}];
    const q = document.getElementById('q');
    const results = document.getElementById('results');
    function render(term) {
      const needle = term.trim().toLowerCase();
      const matches = !needle ? items.slice(0, 40) : items.filter(item =>
        (item.t + ' ' + item.x + ' ' + item.d + ' ' + item.k).toLowerCase().includes(needle)
      ).slice(0, 120);
      results.innerHTML = matches.map(item =>
        `<div class="search-item"><p class="eyebrow">${item.k}</p><h3><a href="${item.u}">${item.t}</a></h3><p class="meta">${item.d}</p><p>${item.x}</p></div>`
      ).join('') || '<p>Ingen treff.</p>';
    }
    q.addEventListener('input', e => render(e.target.value));
    render('');
